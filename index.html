// ── RAG THRESHOLDS ────────────────────────────────────────────────────────────
const RAG={
  ph:{     green:[6.0,7.0], amber:[7.0,7.8], redAbove:7.8, label:'pH', unit:''},
  ec:{     green:[200,500], amber:[120,200], redBelow:120, label:'EC', unit:' µS/cm'},
  nitrogen:{green:[50,150], amber:[20,50],   redBelow:20,  label:'Total N', unit:' mg/L'},
  phosphorus:{green:[5,20], amber:[3,5],     redBelow:3,   label:'Phosphorus', unit:' mg/L'},
  potassium:{green:[50,150],amber:[20,50],   redBelow:20,  label:'Potassium', unit:' mg/L'},
  calcium:{ green:[20,50], amber:[50,70],    redAbove:70,  label:'Calcium', unit:' mg/L'},
  magnesium:{green:[10,30], amber:[5,10],    redBelow:5,   label:'Magnesium', unit:' mg/L'},
};

function ragRating(param, val){
  if(val===null||val===undefined||val==='') return 'na';
  const v=parseFloat(val); if(isNaN(v)) return 'na';
  const r=RAG[param]; if(!r) return 'na';
  if(r.redAbove!==undefined){
    if(v>=r.green[0]&&v<=r.green[1]) return 'green';
    if(v>r.green[1]&&v<=r.amber[1]) return 'amber';
    if(v>r.amber[1]) return 'red';
    return 'amber';
  }
  if(r.redBelow!==undefined){
    if(v>=r.green[0]&&v<=r.green[1]) return 'green';
    if(v>=r.amber[0]&&v<r.green[0]) return 'amber';
    if(v<r.amber[0]) return 'red';
    return 'amber';
  }
  return 'na';
}

function ragBadge(param, val){
  const r=ragRating(param,val);
  if(r==='na') return `<span class="rag-na">—</span>`;
  const v=parseFloat(val);
  const unit=RAG[param]?RAG[param].unit:'';
  return `<span class="rag-${r}">${v}${unit}</span>`;
}

function overallRag(labRecord){
  if(!labRecord) return 'na';
  const params=['ph','nitrogen','phosphorus','potassium','calcium','magnesium'];
  const ratings=params.map(p=>ragRating(p,labRecord[p]||labRecord.ph));
  // For ph specifically
  const allRatings=[
    ragRating('ph',labRecord.ph),
    ragRating('ec',labRecord.ec),
    ragRating('nitrogen',labRecord.nitrogen),
    ragRating('phosphorus',labRecord.phosphorus),
    ragRating('potassium',labRecord.potassium),
    ragRating('calcium',labRecord.calcium),
    ragRating('magnesium',labRecord.magnesium),
  ].filter(r=>r!=='na');
  if(allRatings.includes('red')) return 'red';
  if(allRatings.includes('amber')) return 'amber';
  if(allRatings.length>0) return 'green';
  return 'na';
}

// ── SUPABASE ──────────────────────────────────────────────────────────────────
function setSyncStatus(state,msg){
  const el=document.getElementById('sync-status');
  if(!el)return;
  el.className='sync sync-'+state;
  el.textContent=msg;
}

async function dbGet(table,treeIndex){
  try{
    const res=await fetch(`${SUPA_URL}/rest/v1/${table}?tree_index=eq.${treeIndex}&order=date.asc`,{headers:HDR});
    if(!res.ok) throw new Error(await res.text());
    return await res.json();
  }catch(e){setSyncStatus('error','Sync error');return[];}
}

async function dbGetAll(table){
  try{
    const res=await fetch(`${SUPA_URL}/rest/v1/${table}?order=date.asc`,{headers:HDR});
    if(!res.ok) throw new Error(await res.text());
    return await res.json();
  }catch(e){setSyncStatus('error','Sync error');return[];}
}

async function dbInsert(table,record){
  setSyncStatus('saving','Saving…');
  try{
    const res=await fetch(`${SUPA_URL}/rest/v1/${table}`,{method:'POST',headers:HDR,body:JSON.stringify(record)});
    if(!res.ok) throw new Error(await res.text());
    const data=await res.json();
    setSyncStatus('ok','Synced');
    const el=document.getElementById('last-saved');
    if(el) el.textContent='Saved '+new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
    return Array.isArray(data)?data[0]:data;
  }catch(e){setSyncStatus('error','Save failed — '+e.message);return null;}
}

async function dbDelete(table,id){
  setSyncStatus('saving','Saving…');
  try{
    const res=await fetch(`${SUPA_URL}/rest/v1/${table}?id=eq.${id}`,{method:'DELETE',headers:HDR});
    if(!res.ok) throw new Error(await res.text());
    setSyncStatus('ok','Synced');
  }catch(e){setSyncStatus('error','Delete failed');}
}

// ── STORAGE ───────────────────────────────────────────────────────────────────
function compressImage(file,maxPx,quality){
  return new Promise(resolve=>{
    const reader=new FileReader();
    reader.onload=ev=>{
      const img=new Image();
      img.onload=()=>{
        let w=img.width,h=img.height;
        if(w>maxPx||h>maxPx){
          if(w>h){h=Math.round(h*(maxPx/w));w=maxPx;}
          else{w=Math.round(w*(maxPx/h));h=maxPx;}
        }
        const canvas=document.createElement('canvas');
        canvas.width=w;canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        resolve(canvas.toDataURL('image/jpeg',quality));
      };
      img.src=ev.target.result;
    };
    reader.readAsDataURL(file);
  });
}

async function uploadToStorage(file,treeRef,date){
  const compressed=await compressImage(file,1200,0.80);
  const blob=await fetch(compressed).then(r=>r.blob());
  const filename=`${treeRef}/${date}/${Date.now()}.jpg`;
  const res=await fetch(`${SUPA_URL}/storage/v1/object/${STORAGE_BUCKET}/${filename}`,{
    method:'POST',
    headers:{'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'image/jpeg','x-upsert':'true'},
    body:blob
  });
  if(!res.ok) throw new Error('Upload failed: '+(await res.text()));
  return`${SUPA_URL}/storage/v1/object/public/${STORAGE_BUCKET}/${filename}`;
}

async function deleteFromStorage(url){
  if(!url||!url.includes('/storage/v1/object/public/')) return;
  const path=url.split(`/storage/v1/object/public/${STORAGE_BUCKET}/`)[1];
  if(!path)return;
  await fetch(`${SUPA_URL}/storage/v1/object/${STORAGE_BUCKET}/${path}`,{
    method:'DELETE',headers:{'Authorization':'Bearer '+SUPA_KEY}
  });
}

// ── CACHE ─────────────────────────────────────────────────────────────────────
let cache={soil:{},photos:{},treatments:{},canopy:{},signoffs:{}};
let loaded={};

function soilFromDb(r){return{id:r.id,date:r.date,ph:r.ph||'',ec:r.ec||'',recordType:r.record_type||'visit',soilHumidity:r.soil_humidity,leafDrop:r.leaf_drop,water:r.water,newLeaves:r.new_leaves,foliage:r.foliage,discolouration:r.discolouration,pest:r.pest,nitrogen:r.nitrogen||'',phosphorus:r.phosphorus||'',potassium:r.potassium||'',calcium:r.calcium||'',magnesium:r.magnesium||'',labref:r.labref||'',notes:r.notes||''};}
function soilToDb(d,ti){return{tree_index:ti,date:d.date,ph:d.ph||null,ec:d.ec||null,record_type:d.recordType||'visit',soil_humidity:d.soilHumidity||null,leaf_drop:d.leafDrop||null,water:d.water||null,new_leaves:d.newLeaves||null,foliage:d.foliage||null,discolouration:d.discolouration||null,pest:d.pest||null,nitrogen:d.nitrogen||null,phosphorus:d.phosphorus||null,potassium:d.potassium||null,calcium:d.calcium||null,magnesium:d.magnesium||null,labref:d.labref||null,notes:d.notes||null};}
function photoFromDb(r){return{id:r.id,date:r.date,position:r.position,type:r.type,filename:r.filename||'',imageUrl:r.image_data||null,notes:r.notes||''};}
function photoToDb(d,ti){return{tree_index:ti,date:d.date,position:d.position,type:d.type,filename:d.filename||null,image_data:d.imageUrl||null,notes:d.notes||null};}
function treatFromDb(r){return{id:r.id,date:r.date,product:r.product,type:r.type,concentration:r.concentration||'',volume:r.volume||'',method:r.method,pest:r.pest||'',substrate:r.substrate||'',notes:r.notes||''};}
function treatToDb(d,ti){return{tree_index:ti,date:d.date,product:d.product,type:d.type,concentration:d.concentration||null,volume:d.volume||null,method:d.method,pest:d.pest||null,substrate:d.substrate||null,notes:d.notes||null};}
function canopyFromDb(r){return{id:r.id,date:r.date,spread:r.spread,height:r.height,growthpts:r.growthpts,density:r.density,notes:r.notes||''};}
function canopyToDb(d,ti){return{tree_index:ti,date:d.date,spread:d.spread,height:d.height,growthpts:d.growthpts||null,density:d.density,notes:d.notes||null};}
function signoffFromDb(r){return{id:r.id,date:r.date,lead:r.lead,commentary:r.commentary,adjustments:r.adjustments||''};}
function signoffToDb(d,ti){return{tree_index:ti,date:d.date,lead:d.lead,commentary:d.commentary,adjustments:d.adjustments||null};}

function getCached(section,ti){return(cache[section][ti]||[]).slice().sort((a,b)=>a.date.localeCompare(b.date));}

async function loadTree(ti){
  if(loaded[ti])return;
  showLoading();
  const[soil,photos,treatments,canopy,signoffs]=await Promise.all([
    dbGet('soil_records',ti),dbGet('photos',ti),dbGet('treatments',ti),dbGet('canopy_records',ti),dbGet('signoffs',ti)
  ]);
  cache.soil[ti]=soil.map(soilFromDb);
  cache.photos[ti]=photos.map(photoFromDb);
  cache.treatments[ti]=treatments.map(treatFromDb);
  cache.canopy[ti]=canopy.map(canopyFromDb);
  cache.signoffs[ti]=signoffs.map(signoffFromDb);
  loaded[ti]=true;
  hideLoading();
}

async function loadAllTrees(){
  showLoading();
  for(let i=0;i<12;i++){
    if(!loaded[i]){
      const[soil,photos,treatments,canopy,signoffs]=await Promise.all([
        dbGet('soil_records',i),dbGet('photos',i),dbGet('treatments',i),dbGet('canopy_records',i),dbGet('signoffs',i)
      ]);
      cache.soil[i]=soil.map(soilFromDb);
      cache.photos[i]=photos.map(photoFromDb);
      cache.treatments[i]=treatments.map(treatFromDb);
      cache.canopy[i]=canopy.map(canopyFromDb);
      cache.signoffs[i]=signoffs.map(signoffFromDb);
      loaded[i]=true;
    }
  }
  hideLoading();
}

function hideLoading(){const el=document.getElementById('loading-overlay');if(el)el.style.display='none';}

// ── HELPERS ───────────────────────────────────────────────────────────────────
let currentTree=0,currentTab=0,currentView='dashboard',currentPhotoSubTab='progression';
let charts={};
function today(){return new Date().toISOString().split('T')[0];}
function fv(id){return(document.getElementById(id)||{}).value||'';}
function fmtDate(ds){if(!ds)return'—';const p=ds.split('-');return p.length===3?`${p[2]}/${p[1]}/${p[0]}`:ds;}
function lastVisitDate(i){const s=['soil','photos','treatments','canopy'];let l='';s.forEach(sec=>{const d=getCached(sec,i);if(d.length){const x=d[d.length-1].date;if(x>l)l=x;}});return l;}
function destroyCharts(){Object.values(charts).forEach(c=>{try{c.destroy()}catch(e){}});charts={};}

// ── VIEWS ─────────────────────────────────────────────────────────────────────
function setView(vw){
  currentView=vw;
  document.querySelectorAll('#main-nav button').forEach((b,i)=>b.classList.toggle('active',(i===0&&vw==='dashboard')||(i===1&&vw==='trees')));
  document.getElementById('view-dashboard').style.display=vw==='dashboard'?'block':'none';
  document.getElementById('view-trees').style.display=vw==='trees'?'block':'none';
  destroyCharts();
  if(vw==='dashboard')initDashboard();
  else renderTreesView();
}

async function initDashboard(){
  document.getElementById('view-dashboard').innerHTML=`<div style="padding:2rem;text-align:center;color:#888"><span class="spinner"></span>Loading all trees…</div>`;
  await loadAllTrees();
  renderDashboard();
}

function renderDashboard(){
  const el=document.getElementById('view-dashboard');
  const cards=TREES.map((t,i)=>{
    const soil=getCached('soil',i);
    const canopy=getCached('canopy',i);
    const treatments=getCached('treatments',i);
    const labSoil=soil.filter(e=>e.recordType==='lab');
    const visitSoil=soil.filter(e=>e.recordType!=='lab'&&e.ph);
    const ls=visitSoil[visitSoil.length-1];
    const lc=canopy[canopy.length-1];
    const lab=labSoil[labSoil.length-1];
    const lv=lastVisitDate(i);
    const ragClass=lab?'rag-'+overallRag(lab):'rag-na';
    return`<div class="dash-card ${ragClass}" onclick="openTree(${i})">
      <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:8px">
        <span style="font-weight:500;font-size:14px">${t.name}</span>
        <span style="font-size:11px;color:#888">${t.ref}</span>
      </div>
      <div class="dash-stat"><span>Last visit</span><span class="val">${fmtDate(lv)}</span></div>
      <div class="dash-stat"><span>Latest pH</span><span class="val">${ls&&ls.ph?parseFloat(ls.ph).toFixed(1):'—'}</span></div>
      <div class="dash-stat"><span>Latest EC</span><span class="val">${ls&&ls.ec?ls.ec+' µS/cm':'—'}</span></div>
      <div class="dash-stat"><span>Height</span><span class="val">${lc&&lc.height?parseFloat(lc.height).toFixed(2)+'m':'—'}</span></div>
      <div class="dash-stat"><span>Canopy spread</span><span class="val">${lc&&lc.spread?parseFloat(lc.spread).toFixed(2)+'m':'—'}</span></div>
      <div class="dash-stat"><span>Canopy density</span><span class="val">${lc&&lc.density?Math.round(lc.density)+'%':'—'}</span></div>
      <div class="dash-stat"><span>Treatments</span><span class="val">${treatments.length}</span></div>
    </div>`;
  }).join('');

  const ragKey=`<div style="display:flex;gap:12px;margin-bottom:1rem;font-size:12px;flex-wrap:wrap">
    <span><span class="rag-green" style="margin-right:4px">■</span>All parameters green</span>
    <span><span class="rag-amber" style="margin-right:4px">■</span>One or more parameters need monitoring</span>
    <span><span class="rag-red" style="margin-right:4px">■</span>One or more parameters require action</span>
  </div>`;

  el.innerHTML=`
    ${ragKey}
    <div class="dash-grid">${cards}</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:4px">
      <button onclick="exportAllPDF()" class="primary">Export all sign-offs — PDF</button>
      <button onclick="exportAllExcel()" class="excel"><span class="xl-icon">X</span>Export all logbooks — Excel</button>
    </div>`;
}

function openTree(i){currentTree=i;currentTab=0;setView('trees');renderTreesView();}

function renderTreesView(){
  const el=document.getElementById('view-trees');
  el.innerHTML=`<div class="tree-selector" id="tree-selector"></div><div id="logbook"></div>`;
  initSelector();
  selectTree(currentTree,false);
}

function initSelector(){
  const el=document.getElementById('tree-selector');if(!el)return;
  el.innerHTML=TREES.map((t,i)=>`
    <button class="tree-btn${i===currentTree?' active':''}" onclick="selectTree(${i},true)">
      <span class="tree-name">${t.name}</span>
      <span class="tree-ref">${t.ref}</span>
    </button>`).join('');
}

async function selectTree(i,scroll){
  currentTree=i;currentTab=0;currentPhotoSubTab='progression';
  initSelector();
  const lb=document.getElementById('logbook');if(!lb)return;
  lb.innerHTML=`<div style="padding:2rem;text-align:center;color:#888"><span class="spinner"></span>Loading ${TREES[i].name}…</div>`;
  await loadTree(i);
  const t=TREES[i];
  lb.innerHTML=`
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:1.25rem;padding-bottom:1.25rem;border-bottom:1px solid #ddd;flex-wrap:wrap;gap:8px">
      <div style="width:40px;height:40px;border-radius:50%;background:#EAF3DE;display:flex;align-items:center;justify-content:center;font-weight:500;font-size:14px;color:#27500A;flex-shrink:0">${t.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase()}</div>
      <div style="flex:1;min-width:0"><p style="font-weight:500;font-size:16px">${t.name}</p><p style="font-size:12px;color:#888">Reference ${t.ref}</p></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button onclick="exportTreeExcel(${i})" class="excel"><span class="xl-icon">X</span>Export Excel</button>
        <button onclick="exportTreePDF(${i})">Export PDF</button>
      </div>
    </div>
    <div class="metric-grid" id="summary-metrics"></div>
    <div class="tab-bar" id="tab-bar">
      <button class="active" onclick="setTab(0)">Soil &amp; foliar</button>
      <button onclick="setTab(1)">RAG status</button>
      <button onclick="setTab(2)">Visit observations</button>
      <button onclick="setTab(3)">Photographs</button>
      <button onclick="setTab(4)">Treatments</button>
      <button onclick="setTab(5)">Canopy</button>
      <button onclick="setTab(6)">Sign-off</button>
    </div>
    <div id="tab-content"></div>`;
  destroyCharts();renderSummary();renderTab();
  if(scroll)lb.scrollIntoView({behavior:'smooth',block:'start'});
}

function setTab(i){
  currentTab=i;
  document.querySelectorAll('#tab-bar button').forEach((b,j)=>b.classList.toggle('active',j===i));
  destroyCharts();renderTab();
}

function renderSummary(){
  const soil=getCached('soil',currentTree);
  const canopy=getCached('canopy',currentTree);
  const treatments=getCached('treatments',currentTree);
  const signoffs=getCached('signoffs',currentTree);
  const visitSoil=soil.filter(e=>e.recordType!=='lab'&&e.ph);
  const labSoil=soil.filter(e=>e.recordType==='lab');
  const ls=visitSoil[visitSoil.length-1];
  const lc=canopy[canopy.length-1];
  function trend(arr,key){if(arr.length<2)return'';const d=parseFloat(arr[arr.length-1][key])-parseFloat(arr[arr.length-2][key]);return d>0?'<span class="trend-up"> ▲</span>':d<0?'<span class="trend-down"> ▼</span>':'<span class="trend-flat"> —</span>';}
  const el=document.getElementById('summary-metrics');if(!el)return;
  el.innerHTML=`
    <div class="metric"><div class="lbl">Latest pH</div><div class="val">${ls&&ls.ph?parseFloat(ls.ph).toFixed(1)+trend(visitSoil,'ph'):'—'}</div></div>
    <div class="metric"><div class="lbl">Latest EC</div><div class="val">${ls&&ls.ec?ls.ec:'—'}</div></div>
    <div class="metric"><div class="lbl">Canopy spread</div><div class="val">${lc&&lc.spread?parseFloat(lc.spread).toFixed(2)+'m'+trend(canopy,'spread'):'—'}</div></div>
    <div class="metric"><div class="lbl">Canopy density</div><div class="val">${lc&&lc.density?Math.round(lc.density)+'%'+trend(canopy,'density'):'—'}</div></div>
    <div class="metric"><div class="lbl">Visit readings</div><div class="val">${visitSoil.length}</div></div>
    <div class="metric"><div class="lbl">Lab analyses</div><div class="val">${labSoil.length}</div></div>
    <div class="metric"><div class="lbl">Treatments</div><div class="val">${treatments.length}</div></div>
    <div class="metric"><div class="lbl">Sign-offs</div><div class="val">${signoffs.length}</div></div>`;
}

function renderTab(){
  const tc=document.getElementById('tab-content');if(!tc)return;
  if(currentTab===0)tc.innerHTML=renderSoil();
  else if(currentTab===1)tc.innerHTML=renderRAG();
  else if(currentTab===2)tc.innerHTML=renderObservations();
  else if(currentTab===3)tc.innerHTML=renderPhotos();
  else if(currentTab===4)tc.innerHTML=renderTreatments();
  else if(currentTab===5)tc.innerHTML=renderCanopy();
  else if(currentTab===6)tc.innerHTML=renderSignoff();
  setTimeout(()=>{
    if(currentTab===0)drawSoilCharts();
    if(currentTab===2)drawObsCharts();
    if(currentTab===5)drawCanopyCharts();
  },50);
}

// ── RAG STATUS TAB ────────────────────────────────────────────────────────────
function renderRAG(){
  const soil=getCached('soil',currentTree);
  const labRecords=soil.filter(e=>e.recordType==='lab');
  if(!labRecords.length) return`<p class="empty">No lab baseline data yet. Add a lab test in the Soil &amp; foliar tab.</p>`;

  const rows=labRecords.map(lab=>{
    const params=[
      {key:'ph',label:'pH',val:lab.ph},
      {key:'ec',label:'EC (µS/cm)',val:lab.ec},
      {key:'nitrogen',label:'Total N (mg/L)',val:lab.nitrogen},
      {key:'phosphorus',label:'Phosphorus (mg/L)',val:lab.phosphorus},
      {key:'potassium',label:'Potassium (mg/L)',val:lab.potassium},
      {key:'calcium',label:'Calcium (mg/L)',val:lab.calcium},
      {key:'magnesium',label:'Magnesium (mg/L)',val:lab.magnesium},
    ];
    const tableRows=params.map(p=>`
      <tr>
        <td style="color:#666">${p.label}</td>
        <td>${ragBadge(p.key,p.val)}</td>
        <td style="font-size:11px;color:#888">${RAG[p.key]?`Green: ${RAG[p.key].green[0]}–${RAG[p.key].green[1]} · Amber: ${RAG[p.key].amber[0]}–${RAG[p.key].amber[1]}`:''}</td>
      </tr>`).join('');
    const overall=overallRag(lab);
    return`<div class="card">
      <div class="section-header">
        <div>
          <p style="font-weight:500;font-size:14px">Lab analysis — ${fmtDate(lab.date)}</p>
          <p style="font-size:12px;color:#888;margin-top:2px">Ref: ${lab.labref||'—'}</p>
        </div>
        <span class="rag-${overall}" style="font-size:13px;padding:4px 12px">${overall==='green'?'All parameters green':overall==='amber'?'Needs monitoring':overall==='red'?'Action required':'No data'}</span>
      </div>
      <table class="rag-table">
        <thead><tr><th>Parameter</th><th>Value &amp; status</th><th>Reference ranges</th></tr></thead>
        <tbody>${tableRows}</tbody>
      </table>
      ${lab.notes?`<p style="font-size:12px;color:#666;margin-top:10px">${lab.notes}</p>`:''}
    </div>`;
  }).join('');

  return`<div class="notice">RAG ratings are based on the agreed acceptable appearance ranges. Green = ideal, Amber = monitor, Red = action required.</div>${rows}`;
}

// ── SOIL & FOLIAR ─────────────────────────────────────────────────────────────
function renderSoil(){
  const data=getCached('soil',currentTree);
  const entries=data.slice().reverse().map(e=>`
    <div class="entry-item">
      <div>
        <div style="font-weight:500;font-size:13px">
          ${e.ph?'pH '+parseFloat(e.ph).toFixed(1):'pH —'}${e.ec?' · EC '+e.ec+' µS/cm':''}
          ${e.recordType==='lab'?'<span class="lab-badge">Lab baseline</span>':'<span style="display:inline-block;font-size:10px;padding:1px 6px;border-radius:10px;background:#FAEEDA;color:#633806;margin-left:6px;vertical-align:middle">Visit</span>'}
        </div>
        ${e.nitrogen?`<div style="font-size:12px;color:#666;margin-top:2px">N ${e.nitrogen} · P ${e.phosphorus||'—'} · K ${e.potassium||'—'} · Ca ${e.calcium||'—'} · Mg ${e.magnesium||'—'} mg/L</div>`:''}
        ${e.labref?`<div style="font-size:11px;color:#aaa;margin-top:1px">Ref: ${e.labref}</div>`:''}
        ${e.notes?`<div style="color:#666;font-size:12px;margin-top:3px">${e.notes}</div>`:''}
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
        <span style="font-size:11px;color:#888;white-space:nowrap">${fmtDate(e.date)}</span>
        <button class="danger" style="padding:2px 8px;font-size:11px" onclick="deleteSoil('${e.id}')">Remove</button>
      </div>
    </div>`).join('');

  const phData=data.filter(e=>e.ph);
  const hasNPK=data.some(e=>e.nitrogen);
  const hasCaMg=data.some(e=>e.calcium);
  const chartBlocks=phData.length>=2?`
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:10px">
      <div class="card"><p style="font-size:13px;font-weight:500;margin-bottom:2px">pH trend</p><div class="chart-wrap"><canvas id="chart-ph" role="img" aria-label="pH"></canvas></div></div>
      ${data.filter(e=>e.ec).length>=2?`<div class="card"><p style="font-size:13px;font-weight:500;margin-bottom:2px">EC trend <span style="font-size:11px;font-weight:400;color:#888">µS/cm</span></p><div class="chart-wrap"><canvas id="chart-ec" role="img" aria-label="EC"></canvas></div></div>`:''}
      ${hasNPK?`<div class="card"><p style="font-size:13px;font-weight:500;margin-bottom:2px">N <span style="font-size:11px;font-weight:400;color:#888">mg/L · lab</span></p><div class="chart-wrap"><canvas id="chart-n" role="img" aria-label="N"></canvas></div></div>
      <div class="card"><p style="font-size:13px;font-weight:500;margin-bottom:2px">P <span style="font-size:11px;font-weight:400;color:#888">mg/L · lab</span></p><div class="chart-wrap"><canvas id="chart-p" role="img" aria-label="P"></canvas></div></div>
      <div class="card"><p style="font-size:13px;font-weight:500;margin-bottom:2px">K <span style="font-size:11px;font-weight:400;color:#888">mg/L · lab</span></p><div class="chart-wrap"><canvas id="chart-k" role="img" aria-label="K"></canvas></div></div>`:''}
      ${hasCaMg?`<div class="card"><p style="font-size:13px;font-weight:500;margin-bottom:2px">Ca &amp; Mg <span style="font-size:11px;font-weight:400;color:#888">mg/L · lab</span></p><div class="chart-wrap"><canvas id="chart-camg" role="img" aria-label="CaMg"></canvas></div></div>`:''}
    </div>`:'';

  return`<div class="card">
    <div class="section-header"><p style="font-weight:500;font-size:14px">Log reading</p>
      <div style="display:flex;gap:8px;align-items:center">
        <label style="margin:0;font-size:12px;color:#666">Type</label>
        <select id="s-type" style="width:auto;padding:4px 8px;font-size:12px" onchange="toggleLabFields()">
          <option value="visit">Visit reading</option>
          <option value="lab">Lab test</option>
        </select>
      </div>
    </div>
    <div class="field-row">
      <div><label>Date</label><input type="date" id="s-date" value="${today()}"></div>
      <div><label>pH</label><input type="number" id="s-ph" step="0.1" min="0" max="14" placeholder="6.5"></div>
      <div><label>EC (µS/cm)</label><input type="number" id="s-ec" step="1" placeholder="90"></div>
    </div>
    <div id="visit-obs-fields">
      <div class="field-row">
        <div><label>Soil humidity (%)</label><input type="number" id="s-humidity" step="1" min="0" max="100"></div>
        <div><label>Leaf drop count</label><input type="number" id="s-leafdrop" step="1" min="0"></div>
        <div><label>Water applied (L)</label><input type="number" id="s-water" step="1" min="0"></div>
      </div>
      <div class="field-row">
        <div><label>New leaves</label><select id="s-newleaves"><option>—</option><option>None</option><option>Few</option><option>Many</option></select></div>
        <div><label>Foliage condition</label><select id="s-foliage"><option>—</option><option>Uniform</option><option>Asymetric</option><option>Some Gaps</option><option>Sparse</option></select></div>
        <div><label>Discolouration</label><select id="s-discolouration"><option>—</option><option>Low</option><option>Medium</option><option>High</option></select></div>
      </div>
      <div class="field-row"><div><label>Pest / disease</label><input type="text" id="s-pest" placeholder="e.g. Mealy Bug"></div></div>
    </div>
    <div id="lab-fields" style="display:none">
      <div class="field-row">
        <div><label>Total N (mg/L)</label><input type="number" id="s-n"></div>
        <div><label>Phosphorus (mg/L)</label><input type="number" id="s-p"></div>
        <div><label>Potassium (mg/L)</label><input type="number" id="s-k"></div>
      </div>
      <div class="field-row">
        <div><label>Calcium (mg/L)</label><input type="number" id="s-ca"></div>
        <div><label>Magnesium (mg/L)</label><input type="number" id="s-mg"></div>
        <div><label>Lab reference</label><input type="text" id="s-labref"></div>
      </div>
    </div>
    <div style="margin-bottom:10px"><label>Notes</label><textarea id="s-notes" placeholder="Observations..."></textarea></div>
    <button class="primary" id="save-soil-btn" onclick="addSoil()">Save reading</button>
  </div>
  ${chartBlocks}
  <div class="card">
    <div class="section-header">
      <p style="font-weight:500;font-size:14px">All records (${data.length})</p>
      <div style="display:flex;gap:6px;font-size:11px;align-items:center">
        <span style="background:#E6F1FB;color:#0C447C;padding:1px 7px;border-radius:10px">Lab baseline</span>
        <span style="background:#FAEEDA;color:#633806;padding:1px 7px;border-radius:10px">Visit</span>
      </div>
    </div>
    ${data.length===0?'<p class="empty">No records yet</p>':'<div class="entry-list">'+entries+'</div>'}
  </div>`;
}

function toggleLabFields(){
  const isLab=fv('s-type')==='lab';
  const lf=document.getElementById('lab-fields');
  const vf=document.getElementById('visit-obs-fields');
  if(lf)lf.style.display=isLab?'block':'none';
  if(vf)vf.style.display=isLab?'none':'block';
}

function drawSoilCharts(){
  const data=getCached('soil',currentTree);
  const phData=data.filter(e=>e.ph);
  const ecData=data.filter(e=>e.ec);
  const labData=data.filter(e=>e.recordType==='lab'&&e.nitrogen);
  const mk=(id,vals,dates,col)=>{const ctx=document.getElementById(id);if(!ctx||vals.length<1)return;charts[id]=new Chart(ctx,{type:'line',data:{labels:dates,datasets:[{data:vals,borderColor:col,backgroundColor:col+'22',tension:0.3,pointRadius:4,fill:true,borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:10},maxRotation:45}},y:{ticks:{font:{size:11}}}}}});};
  mk('chart-ph',phData.map(e=>parseFloat(e.ph)),phData.map(e=>fmtDate(e.date)),'#639922');
  mk('chart-ec',ecData.map(e=>parseFloat(e.ec)),ecData.map(e=>fmtDate(e.date)),'#1D9E75');
  if(labData.length){
    const ld=labData.map(e=>fmtDate(e.date));
    mk('chart-n',labData.map(e=>parseFloat(e.nitrogen)),ld,'#185FA5');
    mk('chart-p',labData.map(e=>parseFloat(e.phosphorus)),ld,'#7F77DD');
    mk('chart-k',labData.map(e=>parseFloat(e.potassium)),ld,'#BA7517');
    if(document.getElementById('chart-camg')){
      charts['chart-camg']=new Chart(document.getElementById('chart-camg'),{type:'line',data:{labels:ld,datasets:[{label:'Ca',data:labData.map(e=>parseFloat(e.calcium)),borderColor:'#D85A30',tension:0.3,pointRadius:4,borderWidth:2},{label:'Mg',data:labData.map(e=>parseFloat(e.magnesium)),borderColor:'#0F6E56',tension:0.3,pointRadius:4,borderWidth:2,borderDash:[4,3]}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:10}}},y:{ticks:{font:{size:11}}}}}});
    }
  }
}

async function addSoil(){
  const isLab=fv('s-type')==='lab';
  const d={date:fv('s-date'),ph:fv('s-ph'),ec:fv('s-ec'),recordType:fv('s-type'),
    soilHumidity:isLab?'':fv('s-humidity'),leafDrop:isLab?'':fv('s-leafdrop'),water:isLab?'':fv('s-water'),
    newLeaves:isLab?'':fv('s-newleaves'),foliage:isLab?'':fv('s-foliage'),discolouration:isLab?'':fv('s-discolouration'),pest:isLab?'':fv('s-pest'),
    nitrogen:fv('s-n'),phosphorus:fv('s-p'),potassium:fv('s-k'),calcium:fv('s-ca'),magnesium:fv('s-mg'),labref:fv('s-labref'),notes:fv('s-notes')};
  if(!d.date||!d.ph){alert('Date and pH are required');return;}
  const btn=document.getElementById('save-soil-btn');
  if(btn){btn.disabled=true;btn.textContent='Saving…';}
  const row=await dbInsert('soil_records',soilToDb(d,currentTree));
  if(row){
    if(!cache.soil[currentTree])cache.soil[currentTree]=[];
    cache.soil[currentTree].push(soilFromDb(row));
    cache.soil[currentTree].sort((a,b)=>a.date.localeCompare(b.date));
  }
  renderSummary();renderTab();
}

async function deleteSoil(id){
  if(!confirm('Remove this record?'))return;
  await dbDelete('soil_records',id);
  if(cache.soil[currentTree])cache.soil[currentTree]=cache.soil[currentTree].filter(e=>e.id!==id);
  renderSummary();renderTab();
}

// ── VISIT OBSERVATIONS ────────────────────────────────────────────────────────
function renderObservations(){
  const data=getCached('soil',currentTree).filter(e=>e.recordType!=='lab');
  if(!data.length)return`<p class="empty">No visit records yet.</p>`;
  const tableRows=data.map(e=>`<tr>
    <td>${fmtDate(e.date)}</td>
    <td>${e.soilHumidity!=null&&e.soilHumidity!==''?e.soilHumidity+'%':'—'}</td>
    <td>${e.leafDrop!=null&&e.leafDrop!==''?e.leafDrop:'—'}</td>
    <td>${e.water!=null&&e.water!==''?e.water+'L':'—'}</td>
    <td>${e.newLeaves||'—'}</td>

function excelDate(ds){if(!ds)return'';const p=ds.split('-');return p.length===3?`${p[2]}/${p[1]}/${p[0]}`:ds;}
function applyCell(ws,ref,value,type,bold,bg,fc){if(!ws[ref])ws[ref]={};ws[ref].v=value;ws[ref].t=type||'s';ws[ref].s={font:{name:'Arial',sz:bold?11:10,bold:!!bold,color:{rgb:fc||'333333'}},fill:{fgColor:{rgb:bg||'FFFFFF'},patternType:'solid'},alignment:{horizontal:'left',vertical:'center',wrapText:true},border:{top:{style:'thin',color:{rgb:'CCCCCC'}},bottom:{style:'thin',color:{rgb:'CCCCCC'}},left:{style:'thin',color:{rgb:'CCCCCC'}},right:{style:'thin',color:{rgb:'CCCCCC'}}}};}
function makeHdr(ws,row,headers){headers.forEach((h,i)=>{const ref=XLSX.utils.encode_cell({r:row,c:i});applyCell(ws,ref,h,'s',true,'243D10','FFFFFF');ws[ref].s.font.sz=9;ws[ref].s.alignment={horizontal:'center',vertical:'center',wrapText:true};});}
function makeTitleRow(ws,ref,text){applyCell(ws,ref,text,'s',true,'3B6D11','FFFFFF');ws[ref].s.font.sz=12;}
function dataRows(ws,startRow,rows){rows.forEach((row,ri)=>{const bg=ri%2===0?'F4FAF0':'FFFFFF';row.forEach((val,ci)=>{const ref=XLSX.utils.encode_cell({r:startRow+ri,c:ci});applyCell(ws,ref,val===undefined||val===null?'':val,typeof val==='number'?'n':'s',false,bg);});});}
function mergeRange(ws,r1,c1,r2,c2){if(!ws['!merges'])ws['!merges']=[];ws['!merges'].push({s:{r:r1,c:c1},e:{r:r2,c:c2}});}

function buildExcelWorkbook(ti){
  const t=TREES[ti],soil=getCached('soil',ti),photos=getCached('photos',ti),treatments=getCached('treatments',ti),canopy=getCached('canopy',ti),signoffs=getCached('signoffs',ti);
  const wb=XLSX.utils.book_new();
  const vs=soil.filter(e=>e.recordType!=='lab'&&e.ph);const ls=vs[vs.length-1];const lc=canopy[canopy.length-1];
  const sum={};makeTitleRow(sum,'A1',`${t.name} | ${t.ref} — Tree Service Logbook`);mergeRange(sum,0,0,0,4);
  const metrics=[['Latest visit pH',ls&&ls.ph?parseFloat(ls.ph).toFixed(1):'—'],['Latest EC (µS/cm)',ls&&ls.ec?ls.ec:'—'],['Height',lc&&lc.height?parseFloat(lc.height).toFixed(3)+'m':'—'],['Canopy spread',lc&&lc.spread?parseFloat(lc.spread).toFixed(2)+'m':'—'],['Canopy density',lc&&lc.density?Math.round(lc.density)+'%':'—']];
  metrics.forEach((m,i)=>{const lr=XLSX.utils.encode_cell({r:2,c:i}),vr=XLSX.utils.encode_cell({r:3,c:i});applyCell(sum,lr,m[0],'s',false,'F1EFE8','888780');applyCell(sum,vr,m[1],'s',true,'EAF3DE','3B6D11');sum[lr].s.font.sz=9;sum[vr].s.font.sz=14;sum[lr].s.alignment={horizontal:'center',vertical:'center'};sum[vr].s.alignment={horizontal:'center',vertical:'center'};});
  makeHdr(sum,5,['Date','Lead','Commentary','Programme adjustments']);
  dataRows(sum,6,signoffs.length?signoffs.map(s=>[excelDate(s.date),s.lead,s.commentary,s.adjustments||'']):[[' ',' ',' ',' ']]);
  sum['!cols']=[{wch:14},{wch:24},{wch:44},{wch:44}];sum['!ref']='A1:E'+(7+signoffs.length);
  XLSX.utils.book_append_sheet(wb,sum,'Summary');
  const sf={};makeTitleRow(sf,'A1',`${t.name} (${t.ref}) — Soil & Foliar Records`);mergeRange(sf,0,0,0,10);
  makeHdr(sf,2,['Date','Record type','pH','EC (µS/cm)','Total N (mg/L)','P (mg/L)','K (mg/L)','Ca (mg/L)','Mg (mg/L)','Lab ref','Notes']);
  dataRows(sf,3,soil.length?soil.map(e=>[excelDate(e.date),e.recordType==='lab'?'Lab baseline':'Visit reading',e.ph?parseFloat(e.ph):'',e.ec?parseFloat(e.ec):'',e.nitrogen||'',e.phosphorus||'',e.potassium||'',e.calcium||'',e.magnesium||'',e.labref||'',e.notes||'']):[[' ',' ',' ',' ',' ',' ',' ',' ',' ',' ',' ']]);
  sf['!cols']=[{wch:13},{wch:15},{wch:8},{wch:12},{wch:12},{wch:10},{wch:10},{wch:10},{wch:10},{wch:20},{wch:44}];sf['!ref']='A1:K'+(4+soil.length);
  XLSX.utils.book_append_sheet(wb,sf,'Soil & Foliar');
  const obsRows=soil.filter(e=>e.recordType!=='lab');
  const obs={};makeTitleRow(obs,'A1',`${t.name} (${t.ref}) — Visit Observations`);mergeRange(obs,0,0,0,7);
  makeHdr(obs,2,['Date','Soil humidity (%)','Leaf drop','Water (L)','New leaves','Foliage','Discolouration','Pest']);
  dataRows(obs,3,obsRows.length?obsRows.map(e=>[excelDate(e.date),e.soilHumidity!=null?parseFloat(e.soilHumidity):'',e.leafDrop!=null?parseFloat(e.leafDrop):'',e.water!=null?parseFloat(e.water):'',e.newLeaves||'',e.foliage||'',e.discolouration||'',e.pest||'']):[[' ',' ',' ',' ',' ',' ',' ',' ']]);
  obs['!cols']=[{wch:13},{wch:16},{wch:12},{wch:12},{wch:14},{wch:16},{wch:16},{wch:20}];obs['!ref']='A1:H'+(4+obsRows.length);
  XLSX.utils.book_append_sheet(wb,obs,'Visit Observations');
  const ph={};makeTitleRow(ph,'A1',`${t.name} (${t.ref}) — Photograph Log`);mergeRange(ph,0,0,0,3);
  makeHdr(ph,2,['Date','Reference position','Type','Notes']);
  dataRows(ph,3,photos.length?photos.map(e=>[excelDate(e.date),e.position,e.type,e.notes||'']):[[' ',' ',' ',' ']]);
  ph['!cols']=[{wch:13},{wch:22},{wch:22},{wch:40}];ph['!ref']='A1:D'+(4+photos.length);
  XLSX.utils.book_append_sheet(wb,ph,'Photographs');
  const tr={};makeTitleRow(tr,'A1',`${t.name} (${t.ref}) — Treatment Record`);mergeRange(tr,0,0,0,8);
  makeHdr(tr,2,['Date','Product','Type','Concentration','Volume','Method','Pest','Substrate','Notes']);
  dataRows(tr,3,treatments.length?treatments.map(e=>[excelDate(e.date),e.product,e.type,e.concentration||'',e.volume||'',e.method,e.pest||'',e.substrate||'',e.notes||'']):[[' ',' ',' ',' ',' ',' ',' ',' ',' ']]);
  tr['!cols']=[{wch:13},{wch:22},{wch:18},{wch:14},{wch:12},{wch:18},{wch:22},{wch:22},{wch:36}];tr['!ref']='A1:I'+(4+treatments.length);
  XLSX.utils.book_append_sheet(wb,tr,'Treatments');
  const ca={};makeTitleRow(ca,'A1',`${t.name} (${t.ref}) — Canopy Measurements`);mergeRange(ca,0,0,0,5);
  makeHdr(ca,2,['Date','Canopy spread (m)','Height (m)','New growth points','Density (%)','Notes']);
  dataRows(ca,3,canopy.length?canopy.map(e=>[excelDate(e.date),e.spread?parseFloat(e.spread):'',e.height?parseFloat(e.height):'',e.growthpts?parseInt(e.growthpts):'',e.density?Math.round(parseFloat(e.density)):'',e.notes||'']):[[' ',' ',' ',' ',' ',' ']]);
  ca['!cols']=[{wch:13},{wch:18},{wch:14},{wch:20},{wch:14},{wch:32}];ca['!ref']='A1:F'+(4+canopy.length);
  XLSX.utils.book_append_sheet(wb,ca,'Canopy');
  return wb;
}

function exportTreeExcel(i){const t=TREES[i];XLSX.writeFile(buildExcelWorkbook(i),`${t.ref}_${t.name.replace(/\s+/g,'_')}_Logbook.xlsx`);}
async function exportAllExcel(){await loadAllTrees();TREES.forEach((_,i)=>exportTreeExcel(i));}

function exportTreePDF(i){
  const{jsPDF}=window.jspdf;const doc=new jsPDF({unit:'mm',format:'a4'});
  const t=TREES[i],soil=getCached('soil',i),canopy=getCached('canopy',i),treatments=getCached('treatments',i),signoffs=getCached('signoffs',i);
  const pW=210,m=18,cW=pW-m*2;let y=m;
  const chk=(h=10)=>{if(y+h>285){doc.addPage();y=m;}};
  const ln=(txt,sz=11,bold=false,col=[40,40,40])=>{doc.setFontSize(sz);doc.setFont('helvetica',bold?'bold':'normal');doc.setTextColor(...col);const ls=doc.splitTextToSize(txt,cW);chk(ls.length*sz*0.4+2);doc.text(ls,m,y);y+=ls.length*(sz*0.42)+1;};
  const rule=()=>{chk(4);doc.setDrawColor(59,109,17);doc.setLineWidth(0.3);doc.line(m,y,pW-m,y);y+=4;};
  doc.setFillColor(59,109,17);doc.rect(0,0,210,28,'F');doc.setTextColor(255,255,255);doc.setFontSize(16);doc.setFont('helvetica','bold');doc.text(t.name,m,13);doc.setFontSize(10);doc.setFont('helvetica','normal');doc.text(`Reference ${t.ref} · Logbook · ${new Date().toLocaleDateString('en-GB')}`,m,21);y=36;
  const vs=soil.filter(e=>e.recordType!=='lab');
  ln('Visit observations',13,true,[30,80,10]);rule();
  if(!vs.length)ln('No visit records.',10,false,[120,120,120]);
  else vs.forEach(e=>{ln(`${fmtDate(e.date)}  pH ${e.ph?parseFloat(e.ph).toFixed(1):'—'}  EC ${e.ec||'—'}  Humidity ${e.soilHumidity!=null?e.soilHumidity+'%':'—'}  Leaf drop ${e.leafDrop!=null?e.leafDrop:'—'}  Water ${e.water!=null?e.water+'L':'—'}  Pest: ${e.pest||'—'}`,10);if(e.notes)ln(e.notes,9,false,[100,100,100]);y+=1;});
  y+=4;ln('Lab baselines',13,true,[30,80,10]);rule();
  const labs=soil.filter(e=>e.recordType==='lab');
  if(!labs.length)ln('No lab data.',10,false,[120,120,120]);
  else labs.forEach(e=>{ln(`${fmtDate(e.date)}  pH ${e.ph}  EC ${e.ec}  N ${e.nitrogen||'—'}  P ${e.phosphorus||'—'}  K ${e.potassium||'—'}  Ca ${e.calcium||'—'}  Mg ${e.magnesium||'—'} mg/L`,10);if(e.labref)ln(`Ref: ${e.labref}`,9,false,[100,100,100]);y+=1;});
  y+=4;ln('Treatments',13,true,[30,80,10]);rule();
  if(!treatments.length)ln('No records.',10,false,[120,120,120]);
  else treatments.forEach(e=>{ln(`${fmtDate(e.date)}  ${e.product}  ${e.method}${e.concentration?' Conc:'+e.concentration:''}`,10,true);if(e.pest)ln('Pest: '+e.pest,9,false,[150,50,50]);if(e.notes)ln(e.notes,9,false,[100,100,100]);y+=1;});
  y+=4;ln('Canopy measurements',13,true,[30,80,10]);rule();
  if(!canopy.length)ln('No records.',10,false,[120,120,120]);
  else canopy.forEach(e=>{ln(`${fmtDate(e.date)}  Spread ${parseFloat(e.spread).toFixed(2)}m  Height ${parseFloat(e.height).toFixed(3)}m${e.density?' Density '+Math.round(e.density)+'%':''}`,10);y+=1;});
  y+=4;ln('Monthly sign-offs',13,true,[30,80,10]);rule();
  if(!signoffs.length)ln('No sign-offs recorded.',10,false,[120,120,120]);
  else signoffs.forEach(e=>{ln(`${fmtDate(e.date)} — ${e.lead}`,10,true);ln(e.commentary,10);if(e.adjustments)ln('Adjustments: '+e.adjustments,9,false,[80,100,60]);y+=2;});
  doc.save(`${t.ref}_${t.name.replace(/\s+/g,'_')}_Logbook.pdf`);
}

async function exportAllPDF(){
  await loadAllTrees();
  const{jsPDF}=window.jspdf;const doc=new jsPDF({unit:'mm',format:'a4'});const m=18,pW=210;
  TREES.forEach((t,i)=>{
    if(i>0)doc.addPage();
    doc.setFillColor(59,109,17);doc.rect(0,0,210,28,'F');doc.setTextColor(255,255,255);doc.setFontSize(16);doc.setFont('helvetica','bold');doc.text(t.name,m,13);doc.setFontSize(10);doc.setFont('helvetica','normal');doc.text(`${t.ref} · Sign-off summary · ${new Date().toLocaleDateString('en-GB')}`,m,21);
    let y=36;const signoffs=getCached('signoffs',i),soil=getCached('soil',i),canopy=getCached('canopy',i);
    const vs=soil.filter(e=>e.recordType!=='lab'&&e.ph);const ls=vs[vs.length-1];const lab=soil.find(e=>e.recordType==='lab');const lc=canopy[canopy.length-1];
    doc.setFontSize(10);doc.setFont('helvetica','normal');doc.setTextColor(60,60,60);
    doc.text(`Visit pH: ${ls&&ls.ph?parseFloat(ls.ph).toFixed(1):'—'}  Lab pH: ${lab?lab.ph:'—'}  Spread: ${lc&&lc.spread?parseFloat(lc.spread).toFixed(2)+'m':'—'}  Height: ${lc&&lc.height?parseFloat(lc.height).toFixed(3)+'m':'—'}  Density: ${lc&&lc.density?Math.round(lc.density)+'%':'—'}`,m,y);y+=8;
    doc.setDrawColor(59,109,17);doc.setLineWidth(0.3);doc.line(m,y,pW-m,y);y+=5;
    if(!signoffs.length){doc.setTextColor(150,150,150);doc.text('No sign-offs recorded.',m,y);}
    else signoffs.forEach(e=>{
      if(y>270){doc.addPage();y=20;}
      doc.setFontSize(10);doc.setFont('helvetica','bold');doc.setTextColor(40,80,20);doc.text(`${fmtDate(e.date)} — ${e.lead}`,m,y);y+=5;
      doc.setFont('helvetica','normal');doc.setTextColor(60,60,60);const ls2=doc.splitTextToSize(e.commentary,pW-m*2);doc.text(ls2,m,y);y+=ls2.length*4.5+2;
      if(e.adjustments){const al=doc.splitTextToSize('Adjustments: '+e.adjustments,pW-m*2);doc.setTextColor(59,109,17);doc.text(al,m,y);y+=al.length*4.5+3;}
    });
  });
  doc.save(`all_tree_signoffs_${new Date().toISOString().split('T')[0]}.pdf`);
}
