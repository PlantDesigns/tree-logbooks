async function compressImage(file,maxW,quality){return new Promise(res=>{const img=new Image(),url=URL.createObjectURL(file);img.onload=()=>{let w=img.width,h=img.height;if(w>maxW){h=Math.round(h*maxW/w);w=maxW;}const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);res(c.toDataURL('image/jpeg',quality));URL.revokeObjectURL(url);};img.src=url;});}
async function uploadToStorage(file,treeRef,date){
  const compressed=await compressImage(file,1200,0.80);
  const blob=await fetch(compressed).then(r=>r.blob());
  const filename=`${treeRef}/${date}/${Date.now()}.jpg`;
  const res=await fetch(`${SUPA_URL}/storage/v1/object/${STORAGE_BUCKET}/${filename}`,{method:'POST',headers:{'Authorization':`Bearer ${SUPA_KEY}`,'Content-Type':'image/jpeg','x-upsert':'true'},body:blob});
  if(!res.ok){const err=await res.text();throw new Error('Upload failed: '+err);}
  return`${SUPA_URL}/storage/v1/object/public/${STORAGE_BUCKET}/${filename}`;
}
async function deleteFromStorage(url){
  if(!url||!url.includes('/storage/v1/object/public/'))return;
  const path=url.split(`/storage/v1/object/public/${STORAGE_BUCKET}/`)[1];

}

function paramRAG(key,val){
  if(val===undefined||val===null||val==='')return null;
  const v=parseFloat(val);if(isNaN(v))return null;
  switch(key){
    case'ph': if(v>=6.0&&v<=7.0)return'G'; if(v>7.0&&v<=7.8)return'A'; return'R';
    case'ec': if(v>=200&&v<=500)return'G'; if(v>=120&&v<200)return'A'; return'R';
    case'nitrogen': if(v>=50&&v<=150)return'G'; if(v>=20&&v<50)return'A'; return'R';
    case'phosphorus': if(v>=5&&v<=20)return'G'; if(v>=3&&v<5)return'A'; return'R';
    case'potassium': if(v>=50&&v<=150)return'G'; if(v>=20&&v<50)return'A'; return'R';
    case'calcium': if(v>=20&&v<=50)return'G'; if(v>50&&v<=70)return'A'; return'R';
    case'magnesium': if(v>=10&&v<=30)return'G'; if(v>=5&&v<10)return'A'; return'R';
    case'iron': if(v>=5&&v<=15)return'G'; if(v>=3&&v<5)return'A'; return'R';
    case'sodium': if(v<25)return'G'; if(v>=25&&v<=30)return'A'; return'R';
    default:return null;
  }
}

function calcTreeRAG(ti){
  const soil=load(ti,'soil');
  const lab=soil.find(e=>e.recordType==='lab');
  const visits=soil.filter(e=>e.recordType!=='lab'&&e.ph);
  const latest=visits[visits.length-1];
  const checks=[];
  if(latest){checks.push(paramRAG('ph',latest.ph));checks.push(paramRAG('ec',latest.ec));}
  if(lab){['ph','ec','nitrogen','phosphorus','potassium','calcium','magnesium','iron','sodium'].forEach(k=>checks.push(paramRAG(k,lab[k])));}
  const valid=checks.filter(x=>x!==null);
  if(!valid.length)return null;
  if(valid.includes('R'))return'R'; if(valid.includes('A'))return'A'; return'G';
}

function ragPill(rag,big){
  if(!rag)return`<span class="rag-pill rag-none${big?' rag-big':''}"><span class="rag-dot"></span>No data</span>`;
  const labels={R:'Attention',A:'Monitor',G:'Good'};
  return`<span class="rag-pill rag-${rag}${big?' rag-big':''}"><span class="rag-dot"></span>${labels[rag]}</span>`;
}

function ragParamRow(key,value){
  const d=RAG_DISPLAY[key];if(!d)return'';
  if(value===undefined||value===null||value==='')return`<tr><td style="color:var(--color-text-secondary)">${d.label}</td><td style="color:var(--color-text-tertiary)">—</td><td></td><td style="color:var(--color-text-tertiary);font-size:11px">${d.green}</td><td style="color:var(--color-text-tertiary);font-size:11px">${d.amber}</td><td style="color:var(--color-text-tertiary);font-size:11px">${d.red}</td></tr>`;
  const rag=paramRAG(key,value);
  const ragCell=rag?`<span class="rag-pill rag-${rag}" style="font-size:10px;padding:1px 7px"><span class="rag-dot" style="width:7px;height:7px"></span>${{G:'Green',A:'Amber',R:'Red'}[rag]}</span>`:'—';
  return`<tr><td style="color:var(--color-text-secondary)">${d.label}</td><td style="font-weight:500">${value}${d.unit?' '+d.unit:''}</td><td>${ragCell}</td><td style="color:var(--color-text-tertiary);font-size:11px">${d.green}</td><td style="color:var(--color-text-tertiary);font-size:11px">${d.amber}</td><td style="color:var(--color-text-tertiary);font-size:11px">${d.red}</td></tr>`;
}

function setTab(i){
  currentTab=i;

}
function destroyCharts(){Object.values(charts).forEach(c=>{try{c.destroy()}catch(e){}});charts={};}

function renderSummary(){
  const soil=load(currentTree,'soil'),canopy=load(currentTree,'canopy'),treatments=load(currentTree,'treatments'),signoffs=load(currentTree,'signoffs');
  const visitSoil=soil.filter(e=>e.recordType!=='lab');
  const labSoil=soil.filter(e=>e.recordType==='lab');
  const ls=visitSoil[visitSoil.length-1];const lc=canopy[canopy.length-1];
  function trend(arr,key){if(arr.length<2)return'';const a=parseFloat(arr[arr.length-1][key]),b=parseFloat(arr[arr.length-2][key]);if(isNaN(a)||isNaN(b))return'';const d=a-b;return d>0?'<span class="trend-up"> ▲</span>':d<0?'<span class="trend-down"> ▼</span>':'<span class="trend-flat"> —</span>';}
  const el=document.getElementById('summary-metrics');if(!el)return;
  el.innerHTML=`
    <div class="metric"><div class="lbl">Latest EC (visit)</div><div class="val">${ls&&ls.ec?ls.ec+trend(visitSoil.filter(e=>e.ec),'ec'):'—'}</div></div>
    <div class="metric"><div class="lbl">Lab pH</div><div class="val">${labSoil.length?labSoil[labSoil.length-1].ph:'—'}</div></div>
    <div class="metric"><div class="lbl">Canopy spread</div><div class="val">${lc?parseFloat(lc.spread).toFixed(1)+'m'+trend(canopy,'spread'):'—'}</div></div>
    <div class="metric"><div class="lbl">Canopy density</div><div class="val">${lc?Math.round(lc.density)+'%'+trend(canopy,'density'):'—'}</div></div>
    <div class="metric"><div class="lbl">Visit readings</div><div class="val">${visitSoil.length}</div></div>
    <div class="metric"><div class="lbl">Lab analyses</div><div class="val">${labSoil.length}</div></div>
    <div class="metric"><div class="lbl">Treatments</div><div class="val">${treatments.length}</div></div>
    <div class="metric"><div class="lbl">Sign-offs</div><div class="val">${signoffs.length}</div></div>`;
}

function renderTab(){
  const tc=document.getElementById('tab-content');if(!tc)return;
  if(currentTab===0)tc.innerHTML=renderSoil();
  else if(currentTab===1)tc.innerHTML=renderLabAnalysis();
  else if(currentTab===2)tc.innerHTML=renderObservations();
  else if(currentTab===3)tc.innerHTML=renderPhotos();
  else if(currentTab===4)tc.innerHTML=renderTreatments();
  else if(currentTab===5)tc.innerHTML=renderCanopy();
  else if(currentTab===6)tc.innerHTML=renderSignoff();
  setTimeout(()=>{if(currentTab===0)drawSoilCharts();if(currentTab===2)drawObsCharts();if(currentTab===5)drawCanopyCharts();},50);
}

function setPhotoSubTab(t){
  currentPhotoSubTab=t;
  document.querySelectorAll('.photo-sub-tab-bar button').forEach((b,i)=>b.classList.toggle('active',(i===0&&t==='progression')||(i===1&&t==='all')));
  const pc=document.getElementById('photo-content');if(pc)pc.innerHTML=renderPhotoContent();
}
function renderPhotoContent(){return currentPhotoSubTab==='progression'?renderPhotoProgression():renderPhotoAll();}
function renderPhotoProgression(){
  const data=load(currentTree,'photos');
  if(!data.length)return'<p class="empty">No photographs logged yet.</p>';
  const byPosition={};POSITIONS.forEach(p=>byPosition[p]=[]);
  data.forEach(e=>{const pos=e.position||'Custom';if(!byPosition[pos])byPosition[pos]=[];byPosition[pos].push(e);});
  const blocks=Object.entries(byPosition).filter(([,arr])=>arr.length>0).map(([pos,arr])=>{
    const sorted=[...arr].sort((a,b)=>a.date.localeCompare(b.date));
    const cells=sorted.map(e=>`<div class="prog-cell">
      ${(e.imageUrl||e.imageData)?`<img src="${e.imageUrl||e.imageData}" alt="${pos}" loading="lazy">`:`<div class="no-img">${e.filename||'No image'}</div>`}
      <div class="prog-date">${fmtDate(e.date)}</div><div class="prog-type">${e.type}</div>
    </div>`).join('');
    return`<div class="progression-position"><h4>${pos} (${arr.length})</h4><div class="progression-row">${cells}</div></div>`;
  }).join('');
  return`<div class="card">${blocks}</div>`;
}
function renderPhotoAll(){
  const data=load(currentTree,'photos');
  if(!data.length)return'<p class="empty">No photographs yet</p>';
  const thumbs=data.slice().reverse().map((e,i)=>{
    const imgHtml=(e.imageUrl||e.imageData)?`<img src="${e.imageUrl||e.imageData}" alt="${e.position}" loading="lazy">`:`<div style="height:110px;display:flex;align-items:center;justify-content:center;color:var(--color-text-tertiary);font-size:12px">No image</div>`;
    return`<div class="photo-thumb">${imgHtml}<div class="photo-meta">
      <div class="photo-label">${e.position}</div>
      <div class="photo-date">${fmtDate(e.date)} · ${e.type}</div>
      ${e.notes?`<div style="font-size:11px;color:var(--color-text-secondary);margin-top:2px">${e.notes}</div>`:''}
      <button class="danger photo-remove" onclick="deletePhoto(${data.length-1-i})">Remove</button>
    </div></div>`;
  }).join('');
  return`<div class="card"><div class="photo-grid">${thumbs}</div></div>`;
}
async function addPhoto(){
  const fi=document.getElementById('p-file');
  const d={date:fv('p-date'),position:fv('p-pos'),type:fv('p-type'),notes:fv('p-notes'),imageData:null,imageUrl:null,filename:''};
  if(!d.date){alert('Date is required');return;}
  const file=fi&&fi.files&&fi.files[0];
  const btn=document.getElementById('p-save-btn');
  if(file){
    d.filename=file.name;
    if(btn){btn.disabled=true;btn.textContent='Uploading...';}
    try{const url=await uploadToStorage(file,TREES[currentTree].ref,d.date);d.imageUrl=url;d.imageData=null;}
    catch(e){alert('Upload failed: '+e.message);if(btn){btn.disabled=false;btn.textContent='Save photograph';}return;}
  }
  const arr=load(currentTree,'photos');arr.push(d);save(currentTree,'photos',arr);
  if(btn){btn.disabled=false;btn.textContent='Save photograph';}
  renderTab();
}
async function deletePhoto(idx){
  if(!confirm('Remove this photo?'))return;
  const arr=load(currentTree,'photos');
  const entry=arr[idx];
  if(entry&&entry.imageUrl)await deleteFromStorage(entry.imageUrl);
  arr.splice(idx,1);save(currentTree,'photos',arr);renderSummary();renderTab();
}

  mk('chart-density',data.map(e=>Math.round(parseFloat(e.density))),'#7F77DD');
}
function addCanopy(){
  const d={date:fv('c-date'),spread:fv('c-spread'),height:fv('c-height'),growthpts:fv('c-growth'),density:fv('c-density'),notes:fv('c-notes')};
  if(!d.date||!d.spread||!d.height){alert('Date, spread and height are required');return;}
  const arr=load(currentTree,'canopy');arr.push(d);arr.sort((a,b)=>a.date.localeCompare(b.date));save(currentTree,'canopy',arr);renderSummary();renderTab();
}

function renderSignoff(){
  const data=load(currentTree,'signoffs');
  const entries=data.slice().reverse().map((e,i)=>`
    <div class="sign-off">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <p style="font-size:12px;color:#27500A;font-weight:500;margin-bottom:4px">${fmtDate(e.date)} — signed off by ${e.lead}</p>
          <p style="font-size:13px;color:#27500A">${e.commentary}</p>
          ${e.adjustments?`<p style="font-size:12px;color:#3B6D11;margin-top:4px">Programme adjustments: ${e.adjustments}</p>`:''}
        </div>
        <button class="danger" style="padding:2px 8px;font-size:11px;flex-shrink:0;margin-left:8px" onclick="deleteEntry('signoffs',${data.length-1-i})">Remove</button>
      </div>
    </div>`).join('');
  return`<div class="card">
    <div class="section-header"><p style="font-weight:500;font-size:14px">Monthly sign-off</p><span class="badge">Senior lead</span></div>
    <div class="field-row">
      <div><label>Date</label><input type="date" id="so-date" value="${today()}"></div>
      <div><label>Senior horticultural lead</label><input type="text" id="so-lead" placeholder="Full name"></div>
    </div>
    <div style="margin-bottom:10px"><label>Commentary</label><textarea id="so-commentary" placeholder="Review trends, overall condition, concerns..."></textarea></div>
    <div style="margin-bottom:10px"><label>Programme adjustments</label><textarea id="so-adj" placeholder="Any changes to feeding, treatment or monitoring schedule..."></textarea></div>
    <button class="primary" onclick="addSignoff()">Save sign-off</button>
  </div>
  <div class="card"><div class="section-header"><p style="font-weight:500;font-size:14px">All sign-offs (${data.length})</p></div>
    ${data.length===0?'<p class="empty">No sign-offs yet</p>':entries}
  </div>`;
}
function addSignoff(){
  const d={date:fv('so-date'),lead:fv('so-lead'),commentary:fv('so-commentary'),adjustments:fv('so-adj')};
  if(!d.date||!d.lead||!d.commentary){alert('Date, lead name and commentary are required');return;}
  const arr=load(currentTree,'signoffs');arr.push(d);save(currentTree,'signoffs',arr);renderSummary();renderTab();
}
function deleteEntry(section,idx){
  if(!confirm('Remove this record?'))return;
  const arr=load(currentTree,section);arr.splice(idx,1);save(currentTree,section,arr);renderSummary();renderTab();
}

function excelDate(ds){if(!ds)return'';const p=ds.split('-');return p.length===3?`${p[2]}/${p[1]}/${p[0]}`:ds;}
function applyCell(ws,ref,value,type,bold,bg,fc){if(!ws[ref])ws[ref]={};ws[ref].v=value;ws[ref].t=type||'s';ws[ref].s={font:{name:'Arial',sz:bold?11:10,bold:!!bold,color:{rgb:fc||'333333'}},fill:{fgColor:{rgb:bg||'FFFFFF'},patternType:'solid'},alignment:{horizontal:'left',vertical:'center',wrapText:true},border:{top:{style:'thin',color:{rgb:'CCCCCC'}},bottom:{style:'thin',color:{rgb:'CCCCCC'}},left:{style:'thin',color:{rgb:'CCCCCC'}},right:{style:'thin',color:{rgb:'CCCCCC'}}}};}
function makeHdr(ws,row,headers){headers.forEach((h,i)=>{const ref=XLSX.utils.encode_cell({r:row,c:i});applyCell(ws,ref,h,'s',true,'243D10','FFFFFF');ws[ref].s.font.sz=9;});}
function makeTitleRow(ws,ref,text){applyCell(ws,ref,text,'s',true,'3B6D11','FFFFFF');ws[ref].s.font.sz=12;}
function dataRows(ws,startRow,rows){rows.forEach((row,ri)=>{const bg=ri%2===0?'F4FAF0':'FFFFFF';row.forEach((val,ci)=>{const ref=XLSX.utils.encode_cell({r:startRow+ri,c:ci});applyCell(ws,ref,val===undefined||val===null?'':val,typeof val==='number'?'n':'s',false,bg);});});}
function mergeRange(ws,r1,c1,r2,c2){if(!ws['!merges'])ws['!merges']=[];ws['!merges'].push({s:{r:r1,c:c1},e:{r:r2,c:c2}});}

function buildExcelWorkbook(ti){
  const t=TREES[ti],soil=load(ti,'soil'),photos=load(ti,'photos'),treatments=load(ti,'treatments'),canopy=load(ti,'canopy'),signoffs=load(ti,'signoffs');
  const wb=XLSX.utils.book_new();
  const labs=soil.filter(e=>e.recordType==='lab');const lab=labs[labs.length-1];
  const sum={};makeTitleRow(sum,'A1',`${t.name} | ${t.ref} — Tree Service Logbook`);mergeRange(sum,0,0,0,3);
  makeHdr(sum,2,['Date','Lead','Commentary','Programme adjustments']);
  dataRows(sum,3,signoffs.length?signoffs.map(s=>[excelDate(s.date),s.lead,s.commentary,s.adjustments||'']):[[' ',' ',' ',' ']]);
  sum['!cols']=[{wch:14},{wch:24},{wch:44},{wch:44}];sum['!ref']='A1:D'+(4+signoffs.length);
  XLSX.utils.book_append_sheet(wb,sum,'Summary');
  if(lab){
    const labSheet={};makeTitleRow(labSheet,'A1',`${t.name} (${t.ref}) — Lab Analysis & RAG`);mergeRange(labSheet,0,0,0,6);
    makeHdr(labSheet,2,['Parameter','Value','Unit','RAG','Ideal (green)','Borderline (amber)','Action needed (red)']);
    const params=[['pH','ph',lab.ph,''],['EC','ec',lab.ec,'µS/cm'],['Total N','nitrogen',lab.nitrogen,'mg/l'],['Phosphorus','phosphorus',lab.phosphorus,'mg/l'],['Potassium','potassium',lab.potassium,'mg/l'],['Calcium','calcium',lab.calcium,'mg/l'],['Magnesium','magnesium',lab.magnesium,'mg/l'],['Iron','iron',lab.iron||'','mg/l'],['Sodium','sodium',lab.sodium||'','mg/l']];
    dataRows(labSheet,3,params.map(([lbl,key,val,unit])=>{const r=paramRAG(key,val);const d=RAG_DISPLAY[key];return[lbl,val||'—',unit,r?{G:'Good',A:'Borderline',R:'Action needed'}[r]:'—',d?d.green:'',d?d.amber:'',d?d.red:''];}));
    labSheet['!cols']=[{wch:18},{wch:10},{wch:8},{wch:16},{wch:16},{wch:18},{wch:20}];labSheet['!ref']='A1:G'+(4+params.length);
    XLSX.utils.book_append_sheet(wb,labSheet,'Lab Analysis');
  }
  const sf={};makeTitleRow(sf,'A1',`${t.name} (${t.ref}) — Soil & Foliar`);mergeRange(sf,0,0,0,12);
  makeHdr(sf,2,['Date','Type','pH','EC (µS/cm)','N','P','K','Ca','Mg','Fe','Na','Lab ref','Notes']);
  dataRows(sf,3,soil.length?soil.map(e=>[excelDate(e.date),e.recordType==='lab'?'Lab':'Visit',e.ph?parseFloat(e.ph):'',e.ec?parseFloat(e.ec):'',e.nitrogen||'',e.phosphorus||'',e.potassium||'',e.calcium||'',e.magnesium||'',e.iron||'',e.sodium||'',e.labref||'',e.notes||'']):[[' ',' ',' ',' ',' ',' ',' ',' ',' ',' ',' ',' ',' ']]);
  sf['!cols']=[{wch:13},{wch:8},{wch:8},{wch:12},{wch:8},{wch:8},{wch:8},{wch:8},{wch:8},{wch:8},{wch:8},{wch:20},{wch:44}];sf['!ref']='A1:M'+(4+soil.length);
  XLSX.utils.book_append_sheet(wb,sf,'Soil & Foliar');
  const obsRows=soil.filter(e=>e.recordType!=='lab');
  const obs={};makeTitleRow(obs,'A1',`${t.name} (${t.ref}) — Visit Observations`);mergeRange(obs,0,0,0,7);
  makeHdr(obs,2,['Date','Soil humidity (%)','Leaf drop','Water (L)','New leaves','Foliage','Discolouration','Pest']);
  dataRows(obs,3,obsRows.length?obsRows.map(e=>[excelDate(e.date),e.soilHumidity!==''?parseFloat(e.soilHumidity):'',e.leafDrop!==''?parseFloat(e.leafDrop):'',e.water!==''?parseFloat(e.water):'',e.newLeaves||'',e.foliage||'',e.discolouration||'',e.pest||'']):[[' ',' ',' ',' ',' ',' ',' ',' ']]);
  obs['!cols']=[{wch:13},{wch:16},{wch:12},{wch:12},{wch:14},{wch:16},{wch:16},{wch:20}];obs['!ref']='A1:H'+(4+obsRows.length);
  XLSX.utils.book_append_sheet(wb,obs,'Visit Observations');
  const tr={};makeTitleRow(tr,'A1',`${t.name} (${t.ref}) — Treatments`);mergeRange(tr,0,0,0,8);
  makeHdr(tr,2,['Date','Product','Type','Concentration','Volume','Method','Pest','Substrate','Notes']);
  dataRows(tr,3,treatments.length?treatments.map(e=>[excelDate(e.date),e.product,e.type||'',e.concentration||'',e.volume||'',e.method||'',e.pest||'',e.substrate||'',e.notes||'']):[[' ',' ',' ',' ',' ',' ',' ',' ',' ']]);
  tr['!cols']=[{wch:13},{wch:28},{wch:16},{wch:14},{wch:12},{wch:16},{wch:20},{wch:20},{wch:36}];tr['!ref']='A1:I'+(4+treatments.length);
  XLSX.utils.book_append_sheet(wb,tr,'Treatments');
  const ph={};makeTitleRow(ph,'A1',`${t.name} (${t.ref}) — Photographs`);mergeRange(ph,0,0,0,4);
  makeHdr(ph,2,['Date','Position','Type','URL','Notes']);
  dataRows(ph,3,photos.length?photos.map(e=>[excelDate(e.date),e.position,e.type,e.imageUrl||e.filename||'',e.notes||'']):[[' ',' ',' ',' ',' ']]);
  ph['!cols']=[{wch:13},{wch:22},{wch:22},{wch:60},{wch:40}];ph['!ref']='A1:E'+(4+photos.length);
  XLSX.utils.book_append_sheet(wb,ph,'Photographs');
  const ca={};makeTitleRow(ca,'A1',`${t.name} (${t.ref}) — Canopy`);mergeRange(ca,0,0,0,5);
  makeHdr(ca,2,['Date','Canopy spread (m)','Height (m)','New growth points','Density (%)','Notes']);
  dataRows(ca,3,canopy.length?canopy.map(e=>[excelDate(e.date),e.spread?parseFloat(e.spread):'',e.height?parseFloat(e.height):'',e.growthpts?parseInt(e.growthpts):'',e.density?Math.round(parseFloat(e.density)):'',e.notes||'']):[[' ',' ',' ',' ',' ',' ']]);
  ca['!cols']=[{wch:13},{wch:18},{wch:14},{wch:20},{wch:14},{wch:32}];ca['!ref']='A1:F'+(4+canopy.length);
  XLSX.utils.book_append_sheet(wb,ca,'Canopy');
  return wb;
}

function exportTreeExcel(i){const t=TREES[i];XLSX.writeFile(buildExcelWorkbook(i),`${t.ref}_${t.name.replace(/\s+/g,'_')}_Logbook.xlsx`);}
function exportAllExcel(){TREES.forEach((_,i)=>exportTreeExcel(i));}

function exportTreePDF(i){
  const{jsPDF}=window.jspdf;const doc=new jsPDF({unit:'mm',format:'a4'});
  const t=TREES[i],soil=load(i,'soil'),canopy=load(i,'canopy'),treatments=load(i,'treatments'),signoffs=load(i,'signoffs');
  const rag=calcTreeRAG(i);const ragLabels={R:'Action needed',A:'Borderline',G:'Good',null:'No data'};
  const pW=210,m=18,cW=pW-m*2;let y=m;
  const chk=(h=10)=>{if(y+h>285){doc.addPage();y=m;}};
  const ln=(txt,sz=11,bold=false,col=[40,40,40])=>{doc.setFontSize(sz);doc.setFont('helvetica',bold?'bold':'normal');doc.setTextColor(...col);const ls=doc.splitTextToSize(txt,cW);chk(ls.length*sz*0.4+2);doc.text(ls,m,y);y+=ls.length*(sz*0.42)+1;};
  const rule=()=>{chk(4);doc.setDrawColor(59,109,17);doc.setLineWidth(0.3);doc.line(m,y,pW-m,y);y+=4;};
  doc.setFillColor(59,109,17);doc.rect(0,0,210,28,'F');doc.setTextColor(255,255,255);doc.setFontSize(16);doc.setFont('helvetica','bold');doc.text(t.name,m,13);doc.setFontSize(10);doc.setFont('helvetica','normal');doc.text(`${t.ref} · Logbook · ${new Date().toLocaleDateString('en-GB')} · RAG: ${ragLabels[rag]||'No data'}`,m,21);y=36;
  const lab=soil.find(e=>e.recordType==='lab');
  if(lab){ln('Lab analysis (Cawood NRM)',13,true,[30,80,10]);rule();ln(`${fmtDate(lab.date)} · Ref: ${lab.labref||'—'}`,10);ln(`pH ${lab.ph}  EC ${lab.ec}  N ${lab.nitrogen||'—'}  P ${lab.phosphorus||'—'}  K ${lab.potassium||'—'}  Ca ${lab.calcium||'—'}  Mg ${lab.magnesium||'—'}  Fe ${lab.iron||'—'}  Na ${lab.sodium||'—'} mg/l`,10);if(lab.notes)ln(lab.notes,9,false,[100,100,100]);y+=4;}
  const vs=soil.filter(e=>e.recordType!=='lab');
  ln('Visit observations',13,true,[30,80,10]);rule();
  if(!vs.length)ln('No visit records.',10,false,[120,120,120]);
  else vs.forEach(e=>{ln(`${fmtDate(e.date)}  EC ${e.ec||'—'}  Humidity ${e.soilHumidity!==''?e.soilHumidity+'%':'—'}  Leaf drop ${e.leafDrop!==''?e.leafDrop:'—'}  Water ${e.water!==''?e.water+'L':'—'}  Pest: ${e.pest||'—'}`,10);if(e.notes)ln(e.notes,9,false,[100,100,100]);y+=1;});
  y+=4;ln('Treatments',13,true,[30,80,10]);rule();
  if(!treatments.length)ln('No records.',10,false,[120,120,120]);
  else treatments.forEach(e=>{ln(`${fmtDate(e.date)}  ${e.product}`,10,true);if(e.notes)ln(e.notes,9,false,[100,100,100]);y+=1;});
  y+=4;ln('Sign-offs',13,true,[30,80,10]);rule();
  if(!signoffs.length)ln('No sign-offs.',10,false,[120,120,120]);
  else signoffs.forEach(e=>{ln(`${fmtDate(e.date)} — ${e.lead}`,10,true);ln(e.commentary,10);if(e.adjustments)ln('Adjustments: '+e.adjustments,9,false,[80,100,60]);y+=2;});
  doc.save(`${t.ref}_${t.name.replace(/\s+/g,'_')}_Logbook.pdf`);
}

function exportAllPDF(){
  const{jsPDF}=window.jspdf;const doc=new jsPDF({unit:'mm',format:'a4'});const m=18,pW=210;
  const ragLabels={R:'Action needed',A:'Borderline',G:'Good',null:'No data'};
  TREES.forEach((t,i)=>{
    if(i>0)doc.addPage();
    const rag=calcTreeRAG(i);
    doc.setFillColor(59,109,17);doc.rect(0,0,210,28,'F');doc.setTextColor(255,255,255);doc.setFontSize(16);doc.setFont('helvetica','bold');doc.text(t.name,m,13);doc.setFontSize(10);doc.setFont('helvetica','normal');doc.text(`${t.ref} · ${new Date().toLocaleDateString('en-GB')} · RAG: ${ragLabels[rag]||'No data'}`,m,21);
    let y=36;const signoffs=load(i,'signoffs'),soil=load(i,'soil'),canopy=load(i,'canopy');
    const lab=soil.find(e=>e.recordType==='lab');const lc=canopy[canopy.length-1];
    doc.setFontSize(10);doc.setFont('helvetica','normal');doc.setTextColor(60,60,60);
    if(lab)doc.text(`Lab: pH ${lab.ph}  EC ${lab.ec}  N ${lab.nitrogen||'—'}  P ${lab.phosphorus||'—'}  K ${lab.potassium||'—'} mg/l`,m,y),y+=6;
    doc.text(`Spread: ${lc?parseFloat(lc.spread).toFixed(1)+'m':'—'}`,m,y);y+=8;
    doc.setDrawColor(59,109,17);doc.setLineWidth(0.3);doc.line(m,y,pW-m,y);y+=5;
    if(!signoffs.length){doc.setTextColor(150,150,150);doc.text('No sign-offs recorded.',m,y);}
    else signoffs.forEach(e=>{
      if(y>270){doc.addPage();y=20;}
      doc.setFontSize(10);doc.setFont('helvetica','bold');doc.setTextColor(40,80,20);doc.text(`${fmtDate(e.date)} — ${e.lead}`,m,y);y+=5;
      doc.setFont('helvetica','normal');doc.setTextColor(60,60,60);const ls2=doc.splitTextToSize(e.commentary,pW-m*2);doc.text(ls2,m,y);y+=ls2.length*4.5+3;
    });
  });
  doc.save(`all_tree_signoffs_${new Date().toISOString().split('T')[0]}.pdf`);
}

function exportTreeJSON(i){
  const t=TREES[i];
  const d={tree:t,soil:load(i,'soil'),photos:load(i,'photos').map(p=>({...p,imageData:'[omitted]'})),treatments:load(i,'treatments'),canopy:load(i,'canopy'),signoffs:load(i,'signoffs')};
  const b=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`${t.ref}_${t.name.replace(/\s+/g,'_')}.json`;a.click();
}

seedData();
const lu=localStorage.getItem('logbook_last_updated');
if(lu)document.getElementById('last-updated').textContent='Last updated '+new Date(lu).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
setView('dashboard');
</script>
