body{font-family:Arial,sans-serif;color:#1a1a1a;background:#f5f5f0;min-height:100vh}
.container{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
select,input,textarea{font-family:Arial,sans-serif;font-size:14px;color:#1a1a1a;background:#fff;border:0.5px solid #ccc;border-radius:8px;padding:6px 10px;width:100%}
input[type=number]{-moz-appearance:textfield}
input[type=file]{padding:4px 8px;font-size:13px}
button{font-family:Arial,sans-serif;font-size:13px;font-weight:500;color:#1a1a1a;background:transparent;border:0.5px solid #ccc;border-radius:8px;padding:6px 14px;cursor:pointer}
button:hover{background:#f0f0e8}
button:disabled{opacity:0.5;cursor:not-allowed}
button.primary{background:#3B6D11;color:#EAF3DE;border-color:#3B6D11}
button.primary:hover{background:#27500A}
button.excel{background:#1D6F42;color:#fff;border-color:#1D6F42}

button.danger{background:transparent;color:#a32d2d;border-color:#a32d2d}
button.danger:hover{background:#fcebeb}
.tab-bar{display:flex;gap:4px;border-bottom:1px solid #ddd;margin-bottom:1.5rem;overflow-x:auto}
.tab-bar button{border:none;border-radius:0;border-bottom:2px solid transparent;padding:8px 14px;font-size:13px;white-space:nowrap;background:transparent}
.tab-bar button.active{border-bottom-color:#3B6D11;color:#3B6D11}
.tab-bar button:hover{background:#f0f0e8}
.card{background:#fff;border:0.5px solid #ddd;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1rem}
.field-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:10px}
label{font-size:12px;color:#666;display:block;margin-bottom:4px}
.metric-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:1rem}
.metric{background:#f5f5f0;border-radius:8px;padding:10px 12px}
.metric .val{font-size:20px;font-weight:500;margin-top:2px}
.metric .lbl{font-size:11px;color:#666}
.trend-up{color:#3B6D11}.trend-down{color:#A32D2D}.trend-flat{color:#888}
.chart-wrap{position:relative;height:180px;margin:8px 0}

.badge{font-size:11px;padding:2px 8px;border-radius:20px;background:#EAF3DE;color:#27500A}
textarea{min-height:70px;resize:vertical}
.empty{color:#aaa;font-size:13px;padding:16px 0;text-align:center}

// ── SUPABASE API ──────────────────────────────────────────────────────────────
function setSyncStatus(state, msg) {
  const el = document.getElementById('sync-status');
  if (!el) return;
  el.className = 'sync-indicator sync-' + state;
  el.textContent = msg;
}

async function dbGet(table, treeIndex) {
  try {
    const res = await fetch(`${SUPA_URL}/rest/v1/${table}?tree_index=eq.${treeIndex}&order=date.asc`, {
      headers: HEADERS
    });
    if (!res.ok) throw new Error(await res.text());
    return await res.json();
  } catch(e) {
    console.error('dbGet error', table, e);
    setSyncStatus('error', 'Sync error');
    return [];
  }
}

async function dbInsert(table, record) {
  setSyncStatus('saving', 'Saving…');
  try {
    const res = await fetch(`${SUPA_URL}/rest/v1/${table}`, {
      method: 'POST',
      headers: HEADERS,
      body: JSON.stringify(record)
    });
    if (!res.ok) throw new Error(await res.text());
    const data = await res.json();
    setSyncStatus('ok', 'Synced');
    updateLastUpdated();
    return Array.isArray(data) ? data[0] : data;
  } catch(e) {
    console.error('dbInsert error', table, e);
    setSyncStatus('error', 'Save failed');
    return null;
  }
}

async function dbDelete(table, id) {
  setSyncStatus('saving', 'Saving…');
  try {
    const res = await fetch(`${SUPA_URL}/rest/v1/${table}?id=eq.${id}`, {
      method: 'DELETE',
      headers: HEADERS
    });
    if (!res.ok) throw new Error(await res.text());
    setSyncStatus('ok', 'Synced');
    updateLastUpdated();
  } catch(e) {
    console.error('dbDelete error', table, e);
    setSyncStatus('error', 'Delete failed');
  }
}

function updateLastUpdated() {
  const el = document.getElementById('last-updated');
  if (el) el.textContent = 'Last saved ' + new Date().toLocaleTimeString('en-GB', {hour:'2-digit',minute:'2-digit'});
}

function treatmentFromDb(r) {
  return {id:r.id, date:r.date, product:r.product, type:r.type, concentration:r.concentration||'', volume:r.volume||'', method:r.method, pest:r.pest||'', substrate:r.substrate||'', notes:r.notes||''};
}
function treatmentToDb(d, treeIndex) {

}
function canopyFromDb(r) {
  return {id:r.id, date:r.date, spread:r.spread, height:r.height, growthpts:r.growthpts, density:r.density, notes:r.notes||''};
}
function canopyToDb(d, treeIndex) {
  return {tree_index:treeIndex, date:d.date, spread:d.spread, height:d.height, growthpts:d.growthpts, density:d.density, notes:d.notes||null};
}
function signoffFromDb(r) {
  return {id:r.id, date:r.date, lead:r.lead, commentary:r.commentary, adjustments:r.adjustments||''};
}
function signoffToDb(d, treeIndex) {
  return {tree_index:treeIndex, date:d.date, lead:d.lead, commentary:d.commentary, adjustments:d.adjustments||null};
}

async function loadTree(treeIndex) {
  if (cacheLoaded[treeIndex]) return;
  showLoading();
  const [soil, photos, treatments, canopy, signoffs] = await Promise.all([
    dbGet('soil_records', treeIndex),
    dbGet('photos', treeIndex),
    dbGet('treatments', treeIndex),
    dbGet('canopy_records', treeIndex),
    dbGet('signoffs', treeIndex)
  ]);
  cache.soil[treeIndex] = soil.map(soilFromDb);
  cache.photos[treeIndex] = photos.map(photoFromDb);
  cache.treatments[treeIndex] = treatments.map(treatmentFromDb);
  cache.canopy[treeIndex] = canopy.map(canopyFromDb);
  cache.signoffs[treeIndex] = signoffs.map(signoffFromDb);
  cacheLoaded[treeIndex] = true;
  hideLoading();
}

async function loadAllTrees() {
  showLoading();
  for (let i = 0; i < 12; i++) {
    if (!cacheLoaded[i]) {
      const [soil, photos, treatments, canopy, signoffs] = await Promise.all([
        dbGet('soil_records', i), dbGet('photos', i), dbGet('treatments', i),
        dbGet('canopy_records', i), dbGet('signoffs', i)
      ]);
      cache.soil[i] = soil.map(soilFromDb);
      cache.photos[i] = photos.map(photoFromDb);
      cache.treatments[i] = treatments.map(treatmentFromDb);
      cache.canopy[i] = canopy.map(canopyFromDb);
      cache.signoffs[i] = signoffs.map(signoffFromDb);
      cacheLoaded[i] = true;
    }
  }
  hideLoading();
}

function getCached(section, treeIndex) {
  return (cache[section][treeIndex] || []).slice().sort((a,b) => a.date.localeCompare(b.date));
}

function showLoading() {
  const el = document.getElementById('loading-overlay');
  if (el) el.style.display = 'flex';
}
function hideLoading() {
  const el = document.getElementById('loading-overlay');
  if (el) el.style.display = 'none';
}

async function seedIfEmpty() {

  const existing = await dbGet('soil_records', 0);

  setSyncStatus('saving', 'Loading initial data…');
  for (let i = 0; i < 12; i++) {
    const visits = VISIT_DATA[i] || [];

      await dbInsert('soil_records', soilToDb({

function today() { return new Date().toISOString().split('T')[0]; }
function fv(id) { return (document.getElementById(id)||{}).value||''; }
function fmtDate(ds) {
  if (!ds) return '—';
  const p = ds.split('-');
  return p.length === 3 ? `${p[2]}/${p[1]}/${p[0]}` : ds;
}
function lastVisitDate(i) {
  const sections = ['soil','photos','treatments','canopy'];
  let latest = '';
  sections.forEach(s => {
    const d = getCached(s, i);
    if (d.length) { const x = d[d.length-1].date; if (x > latest) latest = x; }
  });
  return latest;
}

function compressImage(file, maxPx, quality) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => {
        let w = img.width, h = img.height;
        if (w > maxPx || h > maxPx) {
          if (w > h) { h = Math.round(h*(maxPx/w)); w = maxPx; }
          else { w = Math.round(w*(maxPx/h)); h = maxPx; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function renderSummary() {
  const soil = getCached('soil', currentTree);
  const canopy = getCached('canopy', currentTree);
  const treatments = getCached('treatments', currentTree);
  const signoffs = getCached('signoffs', currentTree);
  const visitSoil = soil.filter(e => e.recordType !== 'lab' && e.ph);
  const labSoil = soil.filter(e => e.recordType === 'lab');
  const ls = visitSoil[visitSoil.length-1];
  const lc = canopy[canopy.length-1];
  function trend(arr, key) {
    if (arr.length < 2) return '';
    const d = parseFloat(arr[arr.length-1][key]) - parseFloat(arr[arr.length-2][key]);
    return d > 0 ? '<span class="trend-up"> ▲</span>' : d < 0 ? '<span class="trend-down"> ▼</span>' : '<span class="trend-flat"> —</span>';
  }
  const el = document.getElementById('summary-metrics'); if (!el) return;
  el.innerHTML = `
    <div class="metric"><div class="lbl">Latest pH</div><div class="val">${ls ? parseFloat(ls.ph).toFixed(1)+trend(visitSoil,'ph') : '—'}</div></div>
    <div class="metric"><div class="lbl">Latest EC</div><div class="val">${ls&&ls.ec ? ls.ec : '—'}</div></div>

    <div class="metric"><div class="lbl">Visit readings</div><div class="val">${soil.filter(e=>e.recordType!=='lab').length}</div></div>

    <div class="metric"><div class="lbl">Sign-offs</div><div class="val">${signoffs.length}</div></div>`;
}

function toggleLabFields() {
  const isLab = fv('s-type') === 'lab';
  const lf = document.getElementById('lab-fields');
  const vf = document.getElementById('visit-obs-fields');
  if (lf) lf.style.display = isLab ? 'block' : 'none';
  if (vf) vf.style.display = isLab ? 'none' : 'block';
}

function drawSoilCharts() {
  const data = getCached('soil', currentTree);
  const phData = data.filter(e => e.ph);
  const ecData = data.filter(e => e.ec);
  const labData = data.filter(e => e.recordType==='lab' && e.nitrogen);
  const mk = (id, vals, dates, col) => {
    const ctx = document.getElementById(id); if (!ctx||vals.length<1) return;
    charts[id] = new Chart(ctx, {type:'line', data:{labels:dates, datasets:[{data:vals, borderColor:col, backgroundColor:col+'22', tension:0.3, pointRadius:4, fill:true, borderWidth:2}]}, options:{responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{x:{ticks:{font:{size:10}, maxRotation:45}}, y:{ticks:{font:{size:11}}}}}});
  };
  mk('chart-ph', phData.map(e=>parseFloat(e.ph)), phData.map(e=>fmtDate(e.date)), '#639922');
  mk('chart-ec', ecData.map(e=>parseFloat(e.ec)), ecData.map(e=>fmtDate(e.date)), '#1D9E75');
  if (labData.length) {
    const ld = labData.map(e=>fmtDate(e.date));
    mk('chart-n', labData.map(e=>parseFloat(e.nitrogen)), ld, '#185FA5');
    mk('chart-p', labData.map(e=>parseFloat(e.phosphorus)), ld, '#7F77DD');
    mk('chart-k', labData.map(e=>parseFloat(e.potassium)), ld, '#BA7517');
    if (document.getElementById('chart-camg')) {
      charts['chart-camg'] = new Chart(document.getElementById('chart-camg'), {type:'line', data:{labels:ld, datasets:[{label:'Ca', data:labData.map(e=>parseFloat(e.calcium)), borderColor:'#D85A30', tension:0.3, pointRadius:4, borderWidth:2},{label:'Mg', data:labData.map(e=>parseFloat(e.magnesium)), borderColor:'#0F6E56', tension:0.3, pointRadius:4, borderWidth:2, borderDash:[4,3]}]}, options:{responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{x:{ticks:{font:{size:10}}}, y:{ticks:{font:{size:11}}}}}});
    }
  }
}

async function addSoil() {
  const isLab = fv('s-type') === 'lab';
  const d = {
    date:fv('s-date'), ph:fv('s-ph'), ec:fv('s-ec'), recordType:fv('s-type'),
    soilHumidity:isLab?'':fv('s-humidity'), leafDrop:isLab?'':fv('s-leafdrop'), water:isLab?'':fv('s-water'),
    newLeaves:isLab?'':fv('s-newleaves'), foliage:isLab?'':fv('s-foliage'), discolouration:isLab?'':fv('s-discolouration'), pest:isLab?'':fv('s-pest'),
    nitrogen:fv('s-n'), phosphorus:fv('s-p'), potassium:fv('s-k'), calcium:fv('s-ca'), magnesium:fv('s-mg'), labref:fv('s-labref'), notes:fv('s-notes')
  };
  if (!d.date || !d.ph) { alert('Date and pH are required'); return; }
  const btn = document.getElementById('save-soil-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Saving…'; }
  const row = await dbInsert('soil_records', soilToDb(d, currentTree));
  if (row) {
    if (!cache.soil[currentTree]) cache.soil[currentTree] = [];
    cache.soil[currentTree].push(soilFromDb(row));
    cache.soil[currentTree].sort((a,b) => a.date.localeCompare(b.date));
  }
  renderSummary(); renderTab();
}

async function deleteSoil(id) {
  if (!confirm('Remove this record?')) return;
  await dbDelete('soil_records', id);
  if (cache.soil[currentTree]) cache.soil[currentTree] = cache.soil[currentTree].filter(e => e.id !== id);
  renderSummary(); renderTab();
}

// ── VISIT OBSERVATIONS ────────────────────────────────────────────────────────
function renderObservations() {

      <td>${e.leafDrop!==null&&e.leafDrop!==undefined&&e.leafDrop!=='' ? e.leafDrop : '—'}</td>

      <td>${e.newLeaves||'—'}</td>
      <td>${e.foliage||'—'}</td>
      <td>${e.discolouration||'—'}</td>
      <td>${e.pest||'—'}</td>

  const chartBlock = data.length >= 2 ? `

      <div class="card"><p style="font-size:13px;font-weight:500;margin-bottom:2px">Soil humidity <span style="font-size:11px;font-weight:400;color:#888">(%)</span></p><div class="chart-wrap"><canvas id="chart-humidity" role="img" aria-label="Soil humidity"></canvas></div></div>

      <div class="card"><p style="font-size:13px;font-weight:500;margin-bottom:2px">Water applied <span style="font-size:11px;font-weight:400;color:#888">(L)</span></p><div class="chart-wrap"><canvas id="chart-water" role="img" aria-label="Water applied"></canvas></div></div>
    </div>` : '';

      <div class="section-header"><p style="font-weight:500;font-size:14px">Visit observations (${data.length})</p></div>
      <div style="overflow-x:auto">
        <table class="obs-table">
          <thead><tr><th>Date</th><th>Soil humidity</th><th>Leaf drop</th><th>Water</th><th>New leaves</th><th>Foliage</th><th>Discolouration</th><th>Pest</th></tr></thead>

function drawObsCharts() {
  const data = getCached('soil', currentTree).filter(e => e.recordType !== 'lab');
  if (data.length < 2) return;
  const labels = data.map(e => fmtDate(e.date));
  const mk = (id, vals, col) => {
    const ctx = document.getElementById(id); if (!ctx) return;
    charts[id] = new Chart(ctx, {type:'line', data:{labels, datasets:[{data:vals, borderColor:col, backgroundColor:col+'22', tension:0.3, pointRadius:4, fill:true, borderWidth:2}]}, options:{responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{x:{ticks:{font:{size:10}, maxRotation:45}}, y:{beginAtZero:true, ticks:{font:{size:11}}}}}});

  mk('chart-humidity', data.map(e => e.soilHumidity!==''&&e.soilHumidity!=null ? parseFloat(e.soilHumidity) : null), '#1D9E75');

function renderPhotos() {
  return `<div class="card">
    <div class="section-header"><p style="font-weight:500;font-size:14px">Log photograph</p><span class="badge">Visit record</span></div>
    <div class="field-row">
      <div><label>Date</label><input type="date" id="p-date" value="${today()}"></div>

    </div>
    <div style="margin-bottom:10px"><label>Upload photo</label><input type="file" id="p-file" accept="image/*"></div>
    <div style="margin-bottom:10px"><label>Notes</label><textarea id="p-notes" placeholder="Observations..."></textarea></div>
    <p style="font-size:11px;color:#888;margin-bottom:10px">Photos compressed to 800px JPEG before upload.</p>

function setPhotoSubTab(t) {
  currentPhotoSubTab = t;
  document.querySelectorAll('.photo-sub-tab-bar button').forEach((b,i) => b.classList.toggle('active', (i===0&&t==='progression')||(i===1&&t==='all')));
  const pc = document.getElementById('photo-content');
  if (pc) pc.innerHTML = renderPhotoContent();
}

function renderPhotoContent() { return currentPhotoSubTab==='progression' ? renderPhotoProgression() : renderPhotoAll(); }

function renderPhotoProgression() {
  const data = getCached('photos', currentTree);
  if (!data.length) return '<p class="empty">No photographs logged yet.</p>';
  const byPosition = {};
  POSITIONS.forEach(p => byPosition[p] = []);
  data.forEach(e => { const pos = e.position||'Custom'; if(!byPosition[pos]) byPosition[pos]=[]; byPosition[pos].push(e); });
  const blocks = Object.entries(byPosition).filter(([,arr]) => arr.length>0).map(([pos,arr]) => {
    const sorted = [...arr].sort((a,b) => a.date.localeCompare(b.date));
    const cells = sorted.map(e => `<div class="prog-cell">
      ${e.imageData ? `<img src="${e.imageData}" alt="${pos}">` : `<div class="no-img">${e.filename||'No image'}</div>`}
      <div class="prog-date">${fmtDate(e.date)}</div><div class="prog-type">${e.type}</div>
    </div>`).join('');
    return `<div class="progression-position"><h4>${pos} <span style="font-weight:400;color:#aaa">(${arr.length})</span></h4><div class="progression-row">${cells}</div></div>`;
  }).join('');
  return `<div class="card">${blocks}</div>`;
}

function renderPhotoAll() {
  const data = getCached('photos', currentTree);
  if (!data.length) return '<p class="empty">No photographs yet</p>';
  const thumbs = data.slice().reverse().map(e => {
    const imgHtml = e.imageData ? `<img src="${e.imageData}" alt="${e.position}">` : `<div style="height:110px;display:flex;align-items:center;justify-content:center;color:#aaa;font-size:12px">No image</div>`;
    return `<div class="photo-thumb">${imgHtml}<div class="photo-meta">
      <div class="photo-label">${e.position}</div>
      <div class="photo-date">${fmtDate(e.date)} · ${e.type}</div>
      ${e.notes ? `<div style="font-size:11px;color:#888;margin-top:2px">${e.notes}</div>` : ''}
      <button class="danger photo-remove" onclick="deletePhoto('${e.id}')">Remove</button>
    </div></div>`;
  }).join('');
  return `<div class="card"><div class="photo-grid">${thumbs}</div></div>`;
}

async function addPhoto() {
  const fi = document.getElementById('p-file');
  const d = {date:fv('p-date'), position:fv('p-pos'), type:fv('p-type'), notes:fv('p-notes'), imageData:null, filename:''};
  if (!d.date) { alert('Date is required'); return; }
  const btn = document.getElementById('save-photo-btn');
  const file = fi && fi.files && fi.files[0];
  if (file) {
    d.filename = file.name;
    if (btn) { btn.disabled=true; btn.textContent='Compressing…'; }
    const compressed = await compressImage(file, 800, 0.65);
    d.imageData = compressed;
    if (btn) btn.textContent = 'Uploading…';
  }
  const row = await dbInsert('photos', photoToDb(d, currentTree));
  if (row) {
    if (!cache.photos[currentTree]) cache.photos[currentTree] = [];
    cache.photos[currentTree].push(photoFromDb(row));
    cache.photos[currentTree].sort((a,b) => a.date.localeCompare(b.date));
  }
  renderTab();
}

async function deletePhoto(id) {
  if (!confirm('Remove this photograph?')) return;
  await dbDelete('photos', id);
  if (cache.photos[currentTree]) cache.photos[currentTree] = cache.photos[currentTree].filter(e => e.id !== id);
  renderTab();
}

    <div class="field-row">
      <div><label>New growth point count</label><input type="number" id="c-growth" step="1" placeholder="24"></div>
      <div><label>Canopy density (%)</label><input type="number" id="c-density" step="1" min="0" max="100" placeholder="78"></div>
    </div>
    <div style="margin-bottom:10px"><label>Notes</label><textarea id="c-notes" placeholder="Observations..."></textarea></div>
    <button class="primary" id="save-canopy-btn" onclick="addCanopy()">Save measurement</button>
  </div>${sc}
  <div class="card"><div class="section-header"><p style="font-weight:500;font-size:14px">All records (${data.length})</p></div>
    ${data.length===0 ? '<p class="empty">No records yet</p>' : '<div class="entry-list">'+entries+'</div>'}
  </div>`;
}

function drawCanopyCharts() {
  const data = getCached('canopy', currentTree); if (data.length < 2) return;
  const labels = data.map(e => fmtDate(e.date));
  const mk = (id, vals, col) => {
    const ctx = document.getElementById(id); if (!ctx) return;
    charts[id] = new Chart(ctx, {type:'line', data:{labels, datasets:[{data:vals, borderColor:col, backgroundColor:col+'22', tension:0.3, pointRadius:4, fill:true, borderWidth:2}]}, options:{responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{x:{ticks:{font:{size:10}, maxRotation:45}}, y:{ticks:{font:{size:11}}}}}});
  };
  mk('chart-spread', data.map(e=>parseFloat(e.spread)), '#639922');
  mk('chart-height', data.map(e=>parseFloat(e.height)), '#1D9E75');
  mk('chart-growth', data.map(e=>parseInt(e.growthpts)), '#BA7517');
  mk('chart-density', data.map(e=>Math.round(parseFloat(e.density))), '#7F77DD');
}

async function addCanopy() {
  const d = {date:fv('c-date'),spread:fv('c-spread'),height:fv('c-height'),growthpts:fv('c-growth'),density:fv('c-density'),notes:fv('c-notes')};
  if (!d.date || !d.spread || !d.height) { alert('Date, spread and height are required'); return; }
  const btn = document.getElementById('save-canopy-btn');
  if (btn) { btn.disabled=true; btn.textContent='Saving…'; }
  const row = await dbInsert('canopy_records', canopyToDb(d, currentTree));
  if (row) {
    if (!cache.canopy[currentTree]) cache.canopy[currentTree] = [];
    cache.canopy[currentTree].push(canopyFromDb(row));
    cache.canopy[currentTree].sort((a,b) => a.date.localeCompare(b.date));
  }
  renderSummary(); renderTab();
}

async function deleteCanopy(id) {
  if (!confirm('Remove this record?')) return;
  await dbDelete('canopy_records', id);
  if (cache.canopy[currentTree]) cache.canopy[currentTree] = cache.canopy[currentTree].filter(e => e.id !== id);
  renderSummary(); renderTab();
}

// ── SIGN-OFF ──────────────────────────────────────────────────────────────────
function renderSignoff() {
  const data = getCached('signoffs', currentTree);
  const entries = data.slice().reverse().map(e => `
    <div class="sign-off">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <p style="font-size:12px;color:#27500A;font-weight:500;margin-bottom:4px">${fmtDate(e.date)} — signed off by ${e.lead}</p>
          <p style="font-size:13px;color:#27500A">${e.commentary}</p>
          ${e.adjustments ? `<p style="font-size:12px;color:#3B6D11;margin-top:4px">Programme adjustments: ${e.adjustments}</p>` : ''}
        </div>
        <button class="danger" style="padding:2px 8px;font-size:11px;flex-shrink:0;margin-left:8px" onclick="deleteSignoff('${e.id}')">Remove</button>
      </div>
    </div>`).join('');
  return `<div class="card">
    <div class="section-header"><p style="font-weight:500;font-size:14px">Monthly sign-off</p><span class="badge">Senior lead</span></div>
    <div class="field-row">
      <div><label>Date</label><input type="date" id="so-date" value="${today()}"></div>
      <div><label>Senior horticultural lead</label><input type="text" id="so-lead" placeholder="Full name"></div>
    </div>
    <div style="margin-bottom:10px"><label>Commentary</label><textarea id="so-commentary" placeholder="Review trends, overall condition, concerns..."></textarea></div>
    <div style="margin-bottom:10px"><label>Programme adjustments</label><textarea id="so-adj" placeholder="Any changes to feeding, treatment or monitoring schedule..."></textarea></div>
    <button class="primary" id="save-signoff-btn" onclick="addSignoff()">Save sign-off</button>
  </div>
  <div class="card"><div class="section-header"><p style="font-weight:500;font-size:14px">All sign-offs (${data.length})</p></div>
    ${data.length===0 ? '<p class="empty">No sign-offs yet</p>' : entries}
  </div>`;
}

async function addSignoff() {
  const d = {date:fv('so-date'),lead:fv('so-lead'),commentary:fv('so-commentary'),adjustments:fv('so-adj')};
  if (!d.date || !d.lead || !d.commentary) { alert('Date, lead name and commentary are required'); return; }
  const btn = document.getElementById('save-signoff-btn');
  if (btn) { btn.disabled=true; btn.textContent='Saving…'; }
  const row = await dbInsert('signoffs', signoffToDb(d, currentTree));
  if (row) {
    if (!cache.signoffs[currentTree]) cache.signoffs[currentTree] = [];
    cache.signoffs[currentTree].push(signoffFromDb(row));
    cache.signoffs[currentTree].sort((a,b) => a.date.localeCompare(b.date));
  }
  renderSummary(); renderTab();
}

async function deleteSignoff(id) {
  if (!confirm('Remove this sign-off?')) return;
  await dbDelete('signoffs', id);
  if (cache.signoffs[currentTree]) cache.signoffs[currentTree] = cache.signoffs[currentTree].filter(e => e.id !== id);
  renderSummary(); renderTab();
}

// ── EXPORTS ───────────────────────────────────────────────────────────────────
function excelDate(ds) { if(!ds)return''; const p=ds.split('-'); return p.length===3?`${p[2]}/${p[1]}/${p[0]}`:ds; }
function applyCell(ws,ref,value,type,bold,bg,fc){if(!ws[ref])ws[ref]={};ws[ref].v=value;ws[ref].t=type||'s';ws[ref].s={font:{name:'Arial',sz:bold?11:10,bold:!!bold,color:{rgb:fc||'333333'}},fill:{fgColor:{rgb:bg||'FFFFFF'},patternType:'solid'},alignment:{horizontal:'left',vertical:'center',wrapText:true},border:{top:{style:'thin',color:{rgb:'CCCCCC'}},bottom:{style:'thin',color:{rgb:'CCCCCC'}},left:{style:'thin',color:{rgb:'CCCCCC'}},right:{style:'thin',color:{rgb:'CCCCCC'}}}};}
function makeHdr(ws,row,headers){headers.forEach((h,i)=>{const ref=XLSX.utils.encode_cell({r:row,c:i});applyCell(ws,ref,h,'s',true,'243D10','FFFFFF');ws[ref].s.font.sz=9;ws[ref].s.alignment={horizontal:'center',vertical:'center',wrapText:true};});}
function makeTitleRow(ws,ref,text){applyCell(ws,ref,text,'s',true,'3B6D11','FFFFFF');ws[ref].s.font.sz=12;}
function dataRows(ws,startRow,rows){rows.forEach((row,ri)=>{const bg=ri%2===0?'F4FAF0':'FFFFFF';row.forEach((val,ci)=>{const ref=XLSX.utils.encode_cell({r:startRow+ri,c:ci});applyCell(ws,ref,val===undefined||val===null?'':val,typeof val==='number'?'n':'s',false,bg);});});}
function mergeRange(ws,r1,c1,r2,c2){if(!ws['!merges'])ws['!merges']=[];ws['!merges'].push({s:{r:r1,c:c1},e:{r:r2,c:c2}});}

function buildExcelWorkbook(ti) {
  const t=TREES[ti],soil=getCached('soil',ti),photos=getCached('photos',ti),treatments=getCached('treatments',ti),canopy=getCached('canopy',ti),signoffs=getCached('signoffs',ti);
  const wb=XLSX.utils.book_new();
  const vs=soil.filter(e=>e.recordType!=='lab'&&e.ph);const ls=vs[vs.length-1];const lc=canopy[canopy.length-1];
  const sum={};makeTitleRow(sum,'A1',`${t.name} | ${t.ref} — Tree Service Logbook`);mergeRange(sum,0,0,0,4);
  const metrics=[['Latest visit pH',ls?parseFloat(ls.ph).toFixed(1):'—'],['Latest EC (uS/cm)',ls&&ls.ec?ls.ec:'—'],['Canopy spread',lc?parseFloat(lc.spread).toFixed(1)+'m':'—'],['Canopy density',lc?Math.round(lc.density)+'%':'—'],['Treatments',treatments.length]];
  metrics.forEach((m,i)=>{const lr=XLSX.utils.encode_cell({r:2,c:i}),vr=XLSX.utils.encode_cell({r:3,c:i});applyCell(sum,lr,m[0],'s',false,'F1EFE8','888780');applyCell(sum,vr,m[1],'s',true,'EAF3DE','3B6D11');sum[lr].s.font.sz=9;sum[vr].s.font.sz=16;sum[lr].s.alignment={horizontal:'center',vertical:'center'};sum[vr].s.alignment={horizontal:'center',vertical:'center'};});
  makeHdr(sum,5,['Date','Lead','Commentary','Programme adjustments']);
  dataRows(sum,6,signoffs.length?signoffs.map(s=>[excelDate(s.date),s.lead,s.commentary,s.adjustments||'']):[[' ',' ',' ',' ']]);
  sum['!cols']=[{wch:14},{wch:24},{wch:44},{wch:44}];sum['!ref']='A1:E'+(7+signoffs.length);
  XLSX.utils.book_append_sheet(wb,sum,'Summary');
  const sf={};makeTitleRow(sf,'A1',`${t.name} (${t.ref}) — Soil & Foliar Records`);mergeRange(sf,0,0,0,10);
  makeHdr(sf,2,['Date','Record type','pH','EC (uS/cm)','Total N (mg/L)','P (mg/L)','K (mg/L)','Ca (mg/L)','Mg (mg/L)','Lab ref','Notes']);
  dataRows(sf,3,soil.length?soil.map(e=>[excelDate(e.date),e.recordType==='lab'?'Lab baseline':'Visit reading',e.ph?parseFloat(e.ph):'',e.ec?parseFloat(e.ec):'',e.nitrogen||'',e.phosphorus||'',e.potassium||'',e.calcium||'',e.magnesium||'',e.labref||'',e.notes||'']):[[' ',' ',' ',' ',' ',' ',' ',' ',' ',' ',' ']]);
  sf['!cols']=[{wch:13},{wch:15},{wch:8},{wch:12},{wch:12},{wch:10},{wch:10},{wch:10},{wch:10},{wch:20},{wch:44}];sf['!ref']='A1:K'+(4+soil.length);
  XLSX.utils.book_append_sheet(wb,sf,'Soil & Foliar');
  const obsRows=soil.filter(e=>e.recordType!=='lab');
  const obs={};makeTitleRow(obs,'A1',`${t.name} (${t.ref}) — Visit Observations`);mergeRange(obs,0,0,0,7);
  makeHdr(obs,2,['Date','Soil humidity (%)','Leaf drop','Water (L)','New leaves','Foliage','Discolouration','Pest / disease']);
  dataRows(obs,3,obsRows.length?obsRows.map(e=>[excelDate(e.date),e.soilHumidity!=null?parseFloat(e.soilHumidity):'',e.leafDrop!=null?parseFloat(e.leafDrop):'',e.water!=null?parseFloat(e.water):'',e.newLeaves||'',e.foliage||'',e.discolouration||'',e.pest||'']):[[' ',' ',' ',' ',' ',' ',' ',' ']]);
  obs['!cols']=[{wch:13},{wch:16},{wch:12},{wch:12},{wch:14},{wch:16},{wch:16},{wch:20}];obs['!ref']='A1:H'+(4+obsRows.length);
  XLSX.utils.book_append_sheet(wb,obs,'Visit Observations');
  const ph={};makeTitleRow(ph,'A1',`${t.name} (${t.ref}) — Photograph Log`);mergeRange(ph,0,0,0,4);
  makeHdr(ph,2,['Date','Reference position','Type','Filename','Notes']);
  dataRows(ph,3,photos.length?photos.map(e=>[excelDate(e.date),e.position,e.type,e.filename||'',e.notes||'']):[[' ',' ',' ',' ',' ']]);
  ph['!cols']=[{wch:13},{wch:22},{wch:22},{wch:22},{wch:40}];ph['!ref']='A1:E'+(4+photos.length);
  XLSX.utils.book_append_sheet(wb,ph,'Photographs');
  const tr={};makeTitleRow(tr,'A1',`${t.name} (${t.ref}) — Treatment Record`);mergeRange(tr,0,0,0,8);
  makeHdr(tr,2,['Date','Product','Type','Concentration','Volume','Method','Pest / disease','Substrate','Notes']);
  dataRows(tr,3,treatments.length?treatments.map(e=>[excelDate(e.date),e.product,e.type,e.concentration||'',e.volume||'',e.method,e.pest||'',e.substrate||'',e.notes||'']):[[' ',' ',' ',' ',' ',' ',' ',' ',' ']]);
  tr['!cols']=[{wch:13},{wch:22},{wch:18},{wch:14},{wch:12},{wch:18},{wch:22},{wch:22},{wch:36}];tr['!ref']='A1:I'+(4+treatments.length);
  XLSX.utils.book_append_sheet(wb,tr,'Treatments');
  const ca={};makeTitleRow(ca,'A1',`${t.name} (${t.ref}) — Canopy Measurements`);mergeRange(ca,0,0,0,6);
  makeHdr(ca,2,['Date','Visit #','Canopy spread (m)','Height (m)','New growth points','Density (%)','Notes']);
  dataRows(ca,3,canopy.length?canopy.map((e,idx)=>[excelDate(e.date),idx+1,e.spread?parseFloat(e.spread):'',e.height?parseFloat(e.height):'',e.growthpts?parseInt(e.growthpts):'',e.density?Math.round(parseFloat(e.density)):'',e.notes||'']):[[' ',' ',' ',' ',' ',' ',' ']]);
  ca['!cols']=[{wch:13},{wch:10},{wch:18},{wch:14},{wch:20},{wch:14},{wch:32}];ca['!ref']='A1:G'+(4+canopy.length);
  XLSX.utils.book_append_sheet(wb,ca,'Canopy');
  return wb;
}

function exportTreeExcel(i) { const t=TREES[i]; XLSX.writeFile(buildExcelWorkbook(i), `${t.ref}_${t.name.replace(/\s+/g,'_')}_Logbook.xlsx`); }
async function exportAllExcel() { await loadAllTrees(); TREES.forEach((_,i) => exportTreeExcel(i)); }

function exportTreePDF(i) {
  const{jsPDF}=window.jspdf;const doc=new jsPDF({unit:'mm',format:'a4'});
  const t=TREES[i],soil=getCached('soil',i),canopy=getCached('canopy',i),treatments=getCached('treatments',i),signoffs=getCached('signoffs',i);
  const pW=210,m=18,cW=pW-m*2;let y=m;
  const chk=(h=10)=>{if(y+h>285){doc.addPage();y=m;}};
  const ln=(txt,sz=11,bold=false,col=[40,40,40])=>{doc.setFontSize(sz);doc.setFont('helvetica',bold?'bold':'normal');doc.setTextColor(...col);const ls=doc.splitTextToSize(txt,cW);chk(ls.length*sz*0.4+2);doc.text(ls,m,y);y+=ls.length*(sz*0.42)+1;};
  const rule=()=>{chk(4);doc.setDrawColor(59,109,17);doc.setLineWidth(0.3);doc.line(m,y,pW-m,y);y+=4;};
  doc.setFillColor(59,109,17);doc.rect(0,0,210,28,'F');doc.setTextColor(255,255,255);doc.setFontSize(16);doc.setFont('helvetica','bold');doc.text(t.name,m,13);doc.setFontSize(10);doc.setFont('helvetica','normal');doc.text(`Reference ${t.ref} · Logbook · ${new Date().toLocaleDateString('en-GB')}`,m,21);y=36;
  const vs=soil.filter(e=>e.recordType!=='lab');
  ln('Visit observations',13,true,[30,80,10]);rule();
  if(!vs.length)ln('No visit records.',10,false,[120,120,120]);
  else vs.forEach(e=>{ln(`${fmtDate(e.date)}  pH ${e.ph?parseFloat(e.ph).toFixed(1):'—'}  EC ${e.ec||'—'}  Humidity ${e.soilHumidity!=null?e.soilHumidity+'%':'—'}  Leaf drop ${e.leafDrop!=null?e.leafDrop:'—'}  Water ${e.water!=null?e.water+'L':'—'}  Pest: ${e.pest||'—'}`,10);if(e.notes)ln(e.notes,9,false,[100,100,100]);y+=1;});
  y+=4;ln('Lab baselines (Cawood NRM)',13,true,[30,80,10]);rule();
  const labs=soil.filter(e=>e.recordType==='lab');
  if(!labs.length)ln('No lab data.',10,false,[120,120,120]);
  else labs.forEach(e=>{ln(`${fmtDate(e.date)}  pH ${e.ph}  EC ${e.ec} uS/cm  N ${e.nitrogen||'—'}  P ${e.phosphorus||'—'}  K ${e.potassium||'—'}  Ca ${e.calcium||'—'}  Mg ${e.magnesium||'—'} mg/L`,10);if(e.labref)ln(`Ref: ${e.labref}`,9,false,[100,100,100]);y+=1;});
  y+=4;ln('Treatments',13,true,[30,80,10]);rule();
  if(!treatments.length)ln('No records.',10,false,[120,120,120]);
  else treatments.forEach(e=>{ln(`${fmtDate(e.date)}  ${e.product}  ${e.method}  Conc:${e.concentration||'—'}`,10,true);if(e.pest)ln('Pest: '+e.pest,9,false,[150,50,50]);y+=1;});
  y+=4;ln('Canopy measurements',13,true,[30,80,10]);rule();
  if(!canopy.length)ln('No records.',10,false,[120,120,120]);
  else canopy.forEach(e=>{ln(`${fmtDate(e.date)}  Spread ${parseFloat(e.spread).toFixed(1)}m  Height ${parseFloat(e.height).toFixed(1)}m  Growth pts ${e.growthpts}  Density ${Math.round(e.density)}%`,10);y+=1;});
  y+=4;ln('Monthly sign-offs',13,true,[30,80,10]);rule();
  if(!signoffs.length)ln('No sign-offs recorded.',10,false,[120,120,120]);
  else signoffs.forEach(e=>{ln(`${fmtDate(e.date)} — ${e.lead}`,10,true);ln(e.commentary,10);if(e.adjustments)ln('Adjustments: '+e.adjustments,9,false,[80,100,60]);y+=2;});
  doc.save(`${t.ref}_${t.name.replace(/\s+/g,'_')}_Logbook.pdf`);
}

async function exportAllPDF() {
  await loadAllTrees();
  const{jsPDF}=window.jspdf;const doc=new jsPDF({unit:'mm',format:'a4'});const m=18,pW=210;
  TREES.forEach((t,i)=>{
    if(i>0)doc.addPage();
    doc.setFillColor(59,109,17);doc.rect(0,0,210,28,'F');doc.setTextColor(255,255,255);doc.setFontSize(16);doc.setFont('helvetica','bold');doc.text(t.name,m,13);doc.setFontSize(10);doc.setFont('helvetica','normal');doc.text(`${t.ref} · Sign-off summary · ${new Date().toLocaleDateString('en-GB')}`,m,21);
    let y=36;const signoffs=getCached('signoffs',i),soil=getCached('soil',i),canopy=getCached('canopy',i);
    const vs=soil.filter(e=>e.recordType!=='lab'&&e.ph);const ls=vs[vs.length-1];const lab=soil.find(e=>e.recordType==='lab');const lc=canopy[canopy.length-1];
    doc.setFontSize(10);doc.setFont('helvetica','normal');doc.setTextColor(60,60,60);
    doc.text(`Visit pH: ${ls?parseFloat(ls.ph).toFixed(1):'—'}  EC: ${ls&&ls.ec?ls.ec:'—'}  Lab pH: ${lab?lab.ph:'—'}  Spread: ${lc?parseFloat(lc.spread).toFixed(1)+'m':'—'}`,m,y);y+=8;
    doc.setDrawColor(59,109,17);doc.setLineWidth(0.3);doc.line(m,y,pW-m,y);y+=5;
    if(!signoffs.length){doc.setTextColor(150,150,150);doc.text('No sign-offs recorded.',m,y);}
    else signoffs.forEach(e=>{
      if(y>270){doc.addPage();y=20;}
      doc.setFontSize(10);doc.setFont('helvetica','bold');doc.setTextColor(40,80,20);doc.text(`${fmtDate(e.date)} — ${e.lead}`,m,y);y+=5;
      doc.setFont('helvetica','normal');doc.setTextColor(60,60,60);const ls2=doc.splitTextToSize(e.commentary,pW-m*2);doc.text(ls2,m,y);y+=ls2.length*4.5+2;
      if(e.adjustments){const al=doc.splitTextToSize('Adjustments: '+e.adjustments,pW-m*2);doc.setTextColor(59,109,17);doc.text(al,m,y);y+=al.length*4.5+3;}
    });
  });
  doc.save(`all_tree_signoffs_${new Date().toISOString().split('T')[0]}.pdf`);
}

(async () => {
  await seedIfEmpty();
  setView('dashboard');
