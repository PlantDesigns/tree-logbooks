<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tree Service Logbooks — Regent Street R092</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root{--font-sans:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;--color-text-primary:#1a1a1a;--color-text-secondary:#555;--color-text-tertiary:#999;--color-text-danger:#A32D2D;--color-background-primary:#ffffff;--color-background-secondary:#f7f7f5;--color-border-primary:#bbb;--color-border-secondary:#ccc;--color-border-tertiary:#e5e5e3;--color-border-danger:#e5b4b4;--color-background-danger:#fff0f0;--border-radius-md:6px;--border-radius-lg:10px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);color:var(--color-text-primary);background:#f5f5f3;min-height:100vh}
.app-wrap{max-width:960px;margin:0 auto;padding:1.5rem 1rem}
select,input,textarea{font-family:var(--font-sans);font-size:14px;color:var(--color-text-primary);background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:6px 10px;width:100%}
input[type=number]{-moz-appearance:textfield}
input[type=file]{padding:4px 8px;font-size:13px}
button{font-family:var(--font-sans);font-size:13px;font-weight:500;color:var(--color-text-primary);background:transparent;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:6px 14px;cursor:pointer}
button:hover{background:var(--color-background-secondary)}
button.primary{background:#3B6D11;color:#EAF3DE;border-color:#3B6D11}
button.primary:hover{background:#27500A}
button.excel{background:#1D6F42;color:#fff;border-color:#1D6F42}
button.excel:hover{background:#155232}
button.danger{background:transparent;color:var(--color-text-danger);border-color:var(--color-border-danger)}
button.danger:hover{background:var(--color-background-danger)}
.tab-bar{display:flex;gap:4px;border-bottom:0.5px solid var(--color-border-tertiary);margin-bottom:1.5rem;overflow-x:auto}
.tab-bar button{border:none;border-radius:0;border-bottom:2px solid transparent;padding:8px 14px;font-size:13px;white-space:nowrap;background:transparent}
.tab-bar button.active{border-bottom-color:#3B6D11;color:#3B6D11}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1rem 1.25rem;margin-bottom:1rem}
.field-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:10px}
label{font-size:12px;color:var(--color-text-secondary);display:block;margin-bottom:4px}
.metric-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:1rem}
.metric{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 12px}
.metric .val{font-size:20px;font-weight:500;margin-top:2px}
.metric .lbl{font-size:11px;color:var(--color-text-secondary)}
.trend-up{color:#3B6D11}.trend-down{color:#A32D2D}.trend-flat{color:var(--color-text-secondary)}
.chart-wrap{position:relative;height:180px;margin:8px 0}
.entry-list{display:flex;flex-direction:column;gap:6px;margin-top:8px}
.entry-item{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:8px 12px;font-size:13px;display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.sign-off{background:#EAF3DE;border:0.5px solid #97C459;border-radius:var(--border-radius-md);padding:10px 14px;margin-bottom:8px}
.tree-selector{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;margin-bottom:1.5rem}
.tree-btn{padding:10px 8px;text-align:left;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary)}
.tree-btn.active{border:2px solid #3B6D11;background:#EAF3DE;color:#27500A}
.tree-btn .tree-name{font-size:13px;font-weight:500;display:block}
.tree-btn .tree-ref{font-size:11px;color:var(--color-text-secondary)}
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.badge{font-size:11px;padding:2px 8px;border-radius:20px;background:#EAF3DE;color:#27500A}
textarea{min-height:70px;resize:vertical}
.empty{color:var(--color-text-tertiary);font-size:13px;padding:16px 0;text-align:center}
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-top:10px}
.photo-thumb{border-radius:var(--border-radius-md);overflow:hidden;border:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary)}
.photo-thumb img{width:100%;height:110px;object-fit:cover;display:block}
.photo-thumb .photo-meta{padding:6px 8px}
.photo-thumb .photo-date{font-size:11px;color:var(--color-text-secondary)}
.photo-thumb .photo-label{font-size:12px;font-weight:500;margin-top:1px}
.dash-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:1.5rem}
.dash-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:12px 14px;cursor:pointer}
.dash-card:hover{border-color:var(--color-border-primary)}
.dash-stat{display:flex;justify-content:space-between;font-size:12px;margin-top:4px;color:var(--color-text-secondary)}
.nav-top{display:flex;gap:8px;margin-bottom:1.5rem;border-bottom:0.5px solid var(--color-border-tertiary)}
.nav-top button{border:none;border-radius:0;border-bottom:2px solid transparent;padding:8px 16px;font-size:14px;font-weight:500;background:transparent}
.nav-top button.active{border-bottom-color:#3B6D11;color:#3B6D11}
.xl-icon{display:inline-block;width:14px;height:14px;margin-right:5px;vertical-align:middle;background:#fff;border-radius:2px;font-size:10px;font-weight:700;color:#1D6F42;text-align:center;line-height:14px}
.photo-sub-tab-bar{display:flex;gap:4px;margin-bottom:1rem;border-bottom:0.5px solid var(--color-border-tertiary)}
.photo-sub-tab-bar button{border:none;border-radius:0;border-bottom:2px solid transparent;padding:6px 12px;font-size:12px;background:transparent}
.photo-sub-tab-bar button.active{border-bottom-color:#3B6D11;color:#3B6D11}
.progression-position{margin-bottom:1.5rem}
.progression-position h4{font-size:11px;font-weight:500;margin-bottom:8px;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:0.04em}
.progression-row{display:flex;gap:10px;overflow-x:auto;padding-bottom:6px}
.prog-cell{flex:0 0 130px;text-align:center}
.prog-cell img{width:130px;height:100px;object-fit:cover;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);display:block}
.prog-cell .no-img{width:130px;height:100px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--color-text-tertiary);background:var(--color-background-secondary)}
.prog-cell .prog-date{font-size:11px;color:var(--color-text-secondary);margin-top:4px}
.lab-badge{display:inline-block;font-size:10px;padding:1px 6px;border-radius:10px;background:#E6F1FB;color:#0C447C;margin-left:6px;vertical-align:middle}
.import-notice{background:#E6F1FB;border:0.5px solid #85B7EB;border-radius:var(--border-radius-md);padding:10px 14px;margin-bottom:1rem;font-size:13px;color:#0C447C}
.correction-notice{background:#FCEBEB;border:0.5px solid #F09595;border-radius:var(--border-radius-md);padding:10px 14px;margin-bottom:1rem;font-size:13px;color:#791F1F}
.obs-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px}
.obs-table th{background:#EAF3DE;color:#27500A;font-weight:500;padding:6px 10px;text-align:left;border-bottom:0.5px solid #97C459;white-space:nowrap}
.obs-table td{padding:6px 10px;border-bottom:0.5px solid var(--color-border-tertiary);vertical-align:middle}
.obs-table tr:last-child td{border-bottom:none}
.obs-table tr:nth-child(even) td{background:var(--color-background-secondary)}
.rag-dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:5px;vertical-align:middle;flex-shrink:0}
.rag-pill{display:inline-flex;align-items:center;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500}
.rag-R{background:#FCEBEB;color:#791F1F}.rag-R .rag-dot{background:#E24B4A}
.rag-A{background:#FAEEDA;color:#633806}.rag-A .rag-dot{background:#EF9F27}
.rag-G{background:#EAF3DE;color:#27500A}.rag-G .rag-dot{background:#3B6D11}
.rag-none{background:var(--color-background-secondary);color:var(--color-text-secondary)}.rag-none .rag-dot{background:#B4B2A9}
.rag-big{font-size:13px;padding:4px 12px;border-radius:20px}
.lab-table{width:100%;border-collapse:collapse;font-size:12px}
.lab-table th{font-size:11px;color:var(--color-text-secondary);font-weight:500;padding:4px 8px;text-align:left;border-bottom:0.5px solid var(--color-border-tertiary)}
.lab-table td{padding:5px 8px;border-bottom:0.5px solid var(--color-border-tertiary);vertical-align:middle}
.lab-table tr:last-child td{border-bottom:none}
.rag-legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:1rem;font-size:12px;align-items:center}
.rag-legend-item{display:flex;align-items:center;gap:4px}
.loading{text-align:center;padding:2rem;color:var(--color-text-secondary);font-size:13px}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--color-border-tertiary);border-top-color:#3B6D11;border-radius:50%;animation:spin 0.8s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="app-wrap">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem;flex-wrap:wrap;gap:8px">
  <div>
    <h2 style="font-size:18px;font-weight:500">Tree service logbooks</h2>
    <p style="font-size:13px;color:var(--color-text-secondary);margin-top:2px">Regent Street R092 · 12 trees</p>
  </div>
  <div id="last-updated" style="font-size:12px;color:var(--color-text-tertiary)"></div>
</div>
<div class="nav-top" id="main-nav">
  <button class="active" onclick="setView('dashboard')">Dashboard</button>
  <button onclick="setView('trees')">Individual logbooks</button>
</div>
<div id="view-dashboard"></div>
<div id="view-trees" style="display:none"></div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script>
// ── SUPABASE CONFIG ───────────────────────────────────────────────────────────
const SUPA_URL='https://wujwuspbwwvbhzwnupv.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind1and1c3Bid3d2dmJoendudXB2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MTQ0ODMsImV4cCI6MjA5MjE5MDQ4M30.SQcff7OLA9Jq0NkkC5753UQpraIH3BMA-zPrUfLlKhE';
const STORAGE_BUCKET='photos';
const HDR={'Content-Type':'application/json','apikey':SUPA_KEY,'Authorization':`Bearer ${SUPA_KEY}`};

async function sbGet(table, filter=''){
  const res=await fetch(`${SUPA_URL}/rest/v1/${table}?${filter}&order=date.asc`,{headers:{...HDR,'Prefer':'return=representation'}});
  if(!res.ok) throw new Error(await res.text());
  return res.json();
}
async function sbInsert(table, row){
  const res=await fetch(`${SUPA_URL}/rest/v1/${table}`,{method:'POST',headers:{...HDR,'Prefer':'return=representation'},body:JSON.stringify(row)});
  if(!res.ok) throw new Error(await res.text());
  return res.json();
}
async function sbDelete(table, id){
  const res=await fetch(`${SUPA_URL}/rest/v1/${table}?id=eq.${id}`,{method:'DELETE',headers:HDR});
  if(!res.ok) throw new Error(await res.text());
}
async function sbUpdate(table, id, row){
  const res=await fetch(`${SUPA_URL}/rest/v1/${table}?id=eq.${id}`,{method:'PATCH',headers:{...HDR,'Prefer':'return=representation'},body:JSON.stringify(row)});
  if(!res.ok) throw new Error(await res.text());
  return res.json();
}

// Photo upload
async function compressImage(file,maxW,quality){return new Promise(res=>{const img=new Image(),url=URL.createObjectURL(file);img.onload=()=>{let w=img.width,h=img.height;if(w>maxW){h=Math.round(h*maxW/w);w=maxW;}const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);res(c.toDataURL('image/jpeg',quality));URL.revokeObjectURL(url);};img.src=url;});}
async function uploadPhoto(file,treeRef,date){
  const compressed=await compressImage(file,1200,0.80);
  const blob=await fetch(compressed).then(r=>r.blob());
  const filename=`${treeRef}/${date}/${Date.now()}.jpg`;
  const res=await fetch(`${SUPA_URL}/storage/v1/object/${STORAGE_BUCKET}/${filename}`,{method:'POST',headers:{'Authorization':`Bearer ${SUPA_KEY}`,'Content-Type':'image/jpeg','x-upsert':'true'},body:blob});
  if(!res.ok) throw new Error('Upload failed');
  return`${SUPA_URL}/storage/v1/object/public/${STORAGE_BUCKET}/${filename}`;
}
async function deletePhoto(url){
  if(!url||!url.includes('/storage/v1/object/public/'))return;
  const path=url.split(`/storage/v1/object/public/${STORAGE_BUCKET}/`)[1];
  if(!path)return;
  await fetch(`${SUPA_URL}/storage/v1/object/${STORAGE_BUCKET}/${path}`,{method:'DELETE',headers:{'Authorization':`Bearer ${SUPA_KEY}`}});
}

// ── CONSTANTS ─────────────────────────────────────────────────────────────────
const TREES=[
  {name:'Forest Whitaker',ref:'R1'},{name:'Keanu Leaves',ref:'R2'},{name:'Treeyonce',ref:'R3'},
  {name:'Queen La Treefa',ref:'R4'},{name:'Tree Diddy',ref:'R5'},{name:'Morgan Treeman',ref:'R6'},
  {name:'Chris Pine',ref:'L1'},{name:'Spruce Willis',ref:'L2'},{name:'Wiz Khalifa',ref:'L3'},
  {name:'Elijah Wood',ref:'L4'},{name:'Woody Harrelson',ref:'L5'},{name:'Justin Timberlake',ref:'L6'}
];
const POSITIONS=['North fixed point','South fixed point','East fixed point','West fixed point','Canopy overhead','Base / root zone','Custom'];

// ── RAG ───────────────────────────────────────────────────────────────────────
function paramRAG(key,val){
  if(val===undefined||val===null||val==='')return null;
  const v=parseFloat(val);if(isNaN(v))return null;
  switch(key){
    case'ph': if(v>=6.0&&v<=7.0)return'G'; if(v>7.0&&v<=7.8)return'A'; return'R';
    case'ec': if(v>=200&&v<=500)return'G'; if(v>=120&&v<200)return'A'; return'R';
    case'nitrogen': if(v>=50&&v<=150)return'G'; if(v>=20&&v<50)return'A'; return'R';
    case'phosphorus': if(v>=5&&v<=20)return'G'; if(v>=3&&v<5)return'A'; return'R';
    case'potassium': if(v>=50&&v<=150)return'G'; if(v>=20&&v<50)return'A'; return'R';
    case'calcium': if(v>=20&&v<=50)return'G'; if(v>50&&v<=70)return'A'; return'R';
    case'magnesium': if(v>=10&&v<=30)return'G'; if(v>=5&&v<10)return'A'; return'R';
    case'iron': if(v>=5&&v<=15)return'G'; if(v>=3&&v<5)return'A'; return'R';
    case'sodium': if(v<25)return'G'; if(v>=25&&v<=30)return'A'; return'R';
    default:return null;
  }
}
const RAG_DISPLAY={
  ph:{label:'pH',unit:'',green:'6.0–7.0',amber:'7.0–7.8',red:'>7.8'},
  ec:{label:'EC',unit:'µS/cm',green:'200–500',amber:'120–200',red:'<120'},
  nitrogen:{label:'Total N',unit:'mg/l',green:'50–150',amber:'20–50',red:'<20'},
  phosphorus:{label:'Phosphorus (P)',unit:'mg/l',green:'5–20',amber:'3–5',red:'<3'},
  potassium:{label:'Potassium (K)',unit:'mg/l',green:'50–150',amber:'20–50',red:'<20'},
  calcium:{label:'Calcium (Ca)',unit:'mg/l',green:'20–50',amber:'50–70',red:'>70'},
  magnesium:{label:'Magnesium (Mg)',unit:'mg/l',green:'10–30',amber:'5–10',red:'<5'},
  iron:{label:'Iron (Fe)',unit:'mg/l',green:'5–15',amber:'3–5',red:'<3'},
  sodium:{label:'Sodium (Na)',unit:'mg/l',green:'<25',amber:'25–30',red:'>30'}
};
function calcRAG(visits){
  const lab=visits.find(e=>e.record_type==='lab');
  const vis=visits.filter(e=>e.record_type!=='lab'&&e.ph);
  const latest=vis[vis.length-1];
  const checks=[];
  if(latest){checks.push(paramRAG('ph',latest.ph));checks.push(paramRAG('ec',latest.ec));}
  if(lab){['ph','ec','nitrogen','phosphorus','potassium','calcium','magnesium','iron','sodium'].forEach(k=>checks.push(paramRAG(k,lab[k])));}
  const valid=checks.filter(x=>x!==null);
  if(!valid.length)return null;
  if(valid.includes('R'))return'R'; if(valid.includes('A'))return'A'; return'G';
}
function ragPill(rag,big){
  if(!rag)return`<span class="rag-pill rag-none${big?' rag-big':''}"><span class="rag-dot"></span>No data</span>`;
  const labels={R:'Attention',A:'Monitor',G:'Good'};
  return`<span class="rag-pill rag-${rag}${big?' rag-big':''}"><span class="rag-dot"></span>${labels[rag]}</span>`;
}
function ragParamRow(key,value){
  const d=RAG_DISPLAY[key];if(!d)return'';
  if(value===undefined||value===null||value==='')return`<tr><td style="color:var(--color-text-secondary)">${d.label}</td><td style="color:var(--color-text-tertiary)">—</td><td></td><td style="color:var(--color-text-tertiary);font-size:11px">${d.green}</td><td style="color:var(--color-text-tertiary);font-size:11px">${d.amber}</td><td style="color:var(--color-text-tertiary);font-size:11px">${d.red}</td></tr>`;
  const rag=paramRAG(key,value);
  const ragCell=rag?`<span class="rag-pill rag-${rag}" style="font-size:10px;padding:1px 7px"><span class="rag-dot" style="width:7px;height:7px"></span>${{G:'Green',A:'Amber',R:'Red'}[rag]}</span>`:'—';
  return`<tr><td style="color:var(--color-text-secondary)">${d.label}</td><td style="font-weight:500">${value}${d.unit?' '+d.unit:''}</td><td>${ragCell}</td><td style="color:var(--color-text-tertiary);font-size:11px">${d.green}</td><td style="color:var(--color-text-tertiary);font-size:11px">${d.amber}</td><td style="color:var(--color-text-tertiary);font-size:11px">${d.red}</td></tr>`;
}

// ── STATE ─────────────────────────────────────────────────────────────────────
let currentTree=0,currentTab=0,currentView='dashboard',currentPhotoSubTab='progression';
let treeData={};  // cache: {ref: {visits:[], treatments:[], canopy:[], signoffs:[], photos:[]}}
let charts={};

function fmtDate(ds){if(!ds)return'—';const p=ds.split('-');if(p.length!==3)return ds;return`${p[2]}/${p[1]}/${p[0]}`;}
function today(){return new Date().toISOString().split('T')[0];}
function fv(id){return(document.getElementById(id)||{}).value||'';}
function loading(msg='Loading...'){return`<div class="loading"><span class="spinner"></span>${msg}</div>`;}
function destroyCharts(){Object.values(charts).forEach(c=>{try{c.destroy()}catch(e){}});charts={};}

// ── DATA LAYER ────────────────────────────────────────────────────────────────
async function loadTree(ref){
  const [visits,treatments,canopy,signoffs,photos]=await Promise.all([
    sbGet('visits',`tree_ref=eq.${ref}`),
    sbGet('treatments',`tree_ref=eq.${ref}`),
    sbGet('canopy',`tree_ref=eq.${ref}`),
    sbGet('signoffs',`tree_ref=eq.${ref}`),
    sbGet('photos',`tree_ref=eq.${ref}`)
  ]);
  treeData[ref]={visits,treatments,canopy,signoffs,photos};
  return treeData[ref];
}

async function loadAllTrees(){
  const [visits,treatments,canopy,signoffs,photos]=await Promise.all([
    sbGet('visits',''),
    sbGet('treatments',''),
    sbGet('canopy',''),
    sbGet('signoffs',''),
    sbGet('photos','')
  ]);
  TREES.forEach(t=>{
    treeData[t.ref]={
      visits:visits.filter(e=>e.tree_ref===t.ref),
      treatments:treatments.filter(e=>e.tree_ref===t.ref),
      canopy:canopy.filter(e=>e.tree_ref===t.ref),
      signoffs:signoffs.filter(e=>e.tree_ref===t.ref),
      photos:photos.filter(e=>e.tree_ref===t.ref)
    };
  });
}

// ── VIEWS ─────────────────────────────────────────────────────────────────────
function setView(vw){
  currentView=vw;
  document.querySelectorAll('#main-nav button').forEach((b,i)=>b.classList.toggle('active',(i===0&&vw==='dashboard')||(i===1&&vw==='trees')));
  document.getElementById('view-dashboard').style.display=vw==='dashboard'?'block':'none';
  document.getElementById('view-trees').style.display=vw==='trees'?'block':'none';
  destroyCharts();
  if(vw==='dashboard')renderDashboard();
  else renderTreesView();
}

async function renderDashboard(){
  const el=document.getElementById('view-dashboard');
  el.innerHTML=loading('Loading all trees...');
  try{
    await loadAllTrees();
    const cards=TREES.map((t,i)=>{
      const d=treeData[t.ref];
      const visits=d.visits.filter(e=>e.record_type!=='lab');
      const labs=d.visits.filter(e=>e.record_type==='lab');
      const lv=visits[visits.length-1];
      const ll=labs[labs.length-1];
      const lc=d.canopy[d.canopy.length-1];
      const rag=calcRAG(d.visits);
      return`<div class="dash-card" onclick="openTree(${i})">
        <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:6px">
          <span style="font-weight:500;font-size:14px">${t.name}</span>
          <span style="font-size:11px;color:var(--color-text-secondary)">${t.ref}</span>
        </div>
        <div style="margin-bottom:8px">${ragPill(rag)}</div>
        <div class="dash-stat"><span>Last visit</span><span>${fmtDate(lv?.date)}</span></div>
        <div class="dash-stat"><span>Latest EC</span><span>${lv?.ec?lv.ec+' µS/cm':'—'}</span></div>
        <div class="dash-stat"><span>Lab pH</span><span>${ll?.ph||'—'}</span></div>
        <div class="dash-stat"><span>Height</span><span>${lc?.height?parseFloat(lc.height).toFixed(2)+'m':'—'}</span></div>
        <div class="dash-stat"><span>Treatments</span><span>${d.treatments.length}</span></div>
      </div>`;
    }).join('');
    el.innerHTML=`
      <div class="import-notice">All data stored in Supabase — live across all devices. Click any tree for its full logbook.</div>
      <div class="dash-grid">${cards}</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:4px">
        <button onclick="exportAllPDF()" class="primary">Export all sign-offs — PDF</button>
        <button onclick="exportAllExcel()" class="excel"><span class="xl-icon">X</span>Export all logbooks — Excel</button>
      </div>`;
  }catch(e){el.innerHTML=`<div class="correction-notice">Error loading data: ${e.message}</div>`;}
}

function openTree(i){currentTree=i;currentTab=0;setView('trees');}

function renderTreesView(){
  const el=document.getElementById('view-trees');
  el.innerHTML=`<div class="tree-selector" id="tree-selector"></div><div id="logbook"></div>`;
  initSelector();
  selectTree(currentTree);
}

function initSelector(){
  const el=document.getElementById('tree-selector');if(!el)return;
  el.innerHTML=TREES.map((t,i)=>`
    <button class="tree-btn${i===currentTree?' active':''}" onclick="selectTree(${i})">
      <span class="tree-name">${t.name}</span>
      <span class="tree-ref">${t.ref}</span>
    </button>`).join('');
}

async function selectTree(i){
  currentTree=i;currentTab=0;currentPhotoSubTab='progression';
  initSelector();
  const lb=document.getElementById('logbook');if(!lb)return;
  const t=TREES[i];
  lb.innerHTML=loading(`Loading ${t.name}...`);
  try{
    await loadTree(t.ref);
    const d=treeData[t.ref];
    const rag=calcRAG(d.visits);
    lb.innerHTML=`
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:1.25rem;padding-bottom:1.25rem;border-bottom:0.5px solid var(--color-border-tertiary);flex-wrap:wrap;gap:8px">
        <div style="width:40px;height:40px;border-radius:50%;background:#EAF3DE;display:flex;align-items:center;justify-content:center;font-weight:500;font-size:14px;color:#27500A;flex-shrink:0">${t.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase()}</div>
        <div style="flex:1;min-width:0">
          <p style="font-weight:500;font-size:16px">${t.name}</p>
          <p style="font-size:12px;color:var(--color-text-secondary)">Reference ${t.ref} &nbsp;${ragPill(rag,true)}</p>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button onclick="exportTreeExcel(${i})" class="excel"><span class="xl-icon">X</span>Export Excel</button>
          <button onclick="exportTreePDF(${i})">Export PDF</button>
        </div>
      </div>
      <div class="metric-grid" id="summary-metrics"></div>
      <div class="tab-bar" id="tab-bar">
        <button class="active" onclick="setTab(0)">Soil &amp; foliar</button>
        <button onclick="setTab(1)">Lab analysis</button>
        <button onclick="setTab(2)">Visit observations</button>
        <button onclick="setTab(3)">Photographs</button>
        <button onclick="setTab(4)">Treatments</button>
        <button onclick="setTab(5)">Canopy</button>
        <button onclick="setTab(6)">Sign-off</button>
      </div>
      <div id="tab-content"></div>`;
    renderSummary();renderTab();
  }catch(e){lb.innerHTML=`<div class="correction-notice">Error loading ${t.name}: ${e.message}</div>`;}
}

function setTab(i){
  currentTab=i;
  document.querySelectorAll('#tab-bar button').forEach((b,j)=>b.classList.toggle('active',j===i));
  destroyCharts();renderTab();
}

function renderSummary(){
  const t=TREES[currentTree];const d=treeData[t.ref];if(!d)return;
  const visits=d.visits.filter(e=>e.record_type!=='lab');
  const labs=d.visits.filter(e=>e.record_type==='lab');
  const lv=visits[visits.length-1];const lc=d.canopy[d.canopy.length-1];
  function trend(arr,key){if(arr.length<2)return'';const a=parseFloat(arr[arr.length-1][key]),b=parseFloat(arr[arr.length-2][key]);if(isNaN(a)||isNaN(b))return'';const df=a-b;return df>0?'<span class="trend-up"> ▲</span>':df<0?'<span class="trend-down"> ▼</span>':'<span class="trend-flat"> —</span>';}
  const el=document.getElementById('summary-metrics');if(!el)return;
  const ecVisits=visits.filter(e=>e.ec);
  el.innerHTML=`
    <div class="metric"><div class="lbl">Latest EC</div><div class="val">${lv?.ec?lv.ec+trend(ecVisits,'ec'):'—'}</div></div>
    <div class="metric"><div class="lbl">Lab pH</div><div class="val">${labs.length?labs[labs.length-1].ph:'—'}</div></div>
    <div class="metric"><div class="lbl">Canopy spread</div><div class="val">${lc?parseFloat(lc.spread).toFixed(1)+'m'+trend(d.canopy,'spread'):'—'}</div></div>
    <div class="metric"><div class="lbl">Canopy density</div><div class="val">${lc?Math.round(lc.density)+'%'+trend(d.canopy,'density'):'—'}</div></div>
    <div class="metric"><div class="lbl">Visit readings</div><div class="val">${visits.length}</div></div>
    <div class="metric"><div class="lbl">Lab analyses</div><div class="val">${labs.length}</div></div>
    <div class="metric"><div class="lbl">Treatments</div><div class="val">${d.treatments.length}</div></div>
    <div class="metric"><div class="lbl">Sign-offs</div><div class="val">${d.signoffs.length}</div></div>`;
}

function renderTab(){
  const tc=document.getElementById('tab-content');if(!tc)return;
  if(currentTab===0)tc.innerHTML=renderSoil();
  else if(currentTab===1)tc.innerHTML=renderLabAnalysis();
  else if(currentTab===2)tc.innerHTML=renderObservations();
  else if(currentTab===3)tc.innerHTML=renderPhotos();
  else if(currentTab===4)tc.innerHTML=renderTreatments();
  else if(currentTab===5)tc.innerHTML=renderCanopy();
  else if(currentTab===6)tc.innerHTML=renderSignoff();
  setTimeout(()=>{if(currentTab===0)drawSoilCharts();if(currentTab===2)drawObsCharts();if(currentTab===5)drawCanopyCharts();},50);
}

// ── SOIL & FOLIAR ─────────────────────────────────────────────────────────────
function renderSoil(){
  const t=TREES[currentTree];const d=treeData[t.ref];if(!d)return'';
  const visits=d.visits;
  const entries=visits.slice().reverse().map(e=>`
    <div class="entry-item">
      <div>
        <div style="font-weight:500;font-size:13px">
          ${e.ph?'pH '+parseFloat(e.ph).toFixed(1):''}${e.ec?(e.ph?' · ':'')+' EC '+e.ec+' µS/cm':(!e.ph?'No pH/EC':'') }
          ${e.record_type==='lab'?'<span class="lab-badge">Lab</span>':'<span style="display:inline-block;font-size:10px;padding:1px 6px;border-radius:10px;background:#FAEEDA;color:#633806;margin-left:6px;vertical-align:middle">Visit</span>'}
        </div>
        ${e.nitrogen?`<div style="font-size:12px;color:var(--color-text-secondary);margin-top:2px">N ${e.nitrogen} · P ${e.phosphorus||'—'} · K ${e.potassium||'—'} · Ca ${e.calcium||'—'} · Mg ${e.magnesium||'—'} · Fe ${e.iron||'—'} · Na ${e.sodium||'—'} mg/l</div>`:''}
        ${e.notes?`<div style="color:var(--color-text-secondary);font-size:12px;margin-top:3px">${e.notes}</div>`:''}
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
        <span style="font-size:11px;color:var(--color-text-secondary);white-space:nowrap">${fmtDate(e.date)}</span>
        <button class="danger" style="padding:2px 8px;font-size:11px" onclick="deleteVisit('${e.id}')">Remove</button>
      </div>
    </div>`).join('');
  const phData=visits.filter(e=>e.ph);
  const ecData=visits.filter(e=>e.ec);
  const hasNPK=visits.some(e=>e.nitrogen);
  const chartBlocks=(phData.length>=2||ecData.length>=2)?`<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:10px">
    ${phData.length>=2?`<div class="card"><p style="font-size:13px;font-weight:500;margin-bottom:2px">pH trend</p><div class="chart-wrap"><canvas id="chart-ph"></canvas></div></div>`:''}
    ${ecData.length>=2?`<div class="card"><p style="font-size:13px;font-weight:500;margin-bottom:2px">EC trend <span style="font-size:11px;font-weight:400;color:var(--color-text-secondary)">µS/cm</span></p><div class="chart-wrap"><canvas id="chart-ec"></canvas></div></div>`:''}
    ${hasNPK?`<div class="card"><p style="font-size:13px;font-weight:500;margin-bottom:2px">N · P · K <span style="font-size:11px;font-weight:400;color:var(--color-text-secondary)">mg/l</span></p><div class="chart-wrap"><canvas id="chart-npk"></canvas></div></div>`:''}
  </div>`:'';
  return`<div class="card">
    <div class="section-header"><p style="font-weight:500;font-size:14px">Log reading</p>
      <select id="s-type" style="width:auto;padding:4px 8px;font-size:12px" onchange="toggleLabFields()">
        <option value="visit">Visit reading</option><option value="lab">Lab test</option>
      </select>
    </div>
    <div class="field-row">
      <div><label>Date</label><input type="date" id="s-date" value="${today()}"></div>
      <div><label>pH</label><input type="number" id="s-ph" step="0.1" min="0" max="14" placeholder="6.5"></div>
      <div><label>EC (µS/cm)</label><input type="number" id="s-ec" step="1" placeholder="200"></div>
    </div>
    <div id="visit-obs-fields">
      <div class="field-row">
        <div><label>Soil humidity (%)</label><input type="number" id="s-humidity" step="1" min="0" max="100"></div>
        <div><label>Leaf drop count</label><input type="number" id="s-leafdrop" step="1" min="0"></div>
        <div><label>Water applied (L)</label><input type="number" id="s-water" step="1" min="0"></div>
      </div>
      <div class="field-row">
        <div><label>New leaves</label><select id="s-newleaves"><option>—</option><option>None</option><option>Few</option><option>Many</option></select></div>
        <div><label>Foliage</label><select id="s-foliage"><option>—</option><option>Uniform</option><option>Asymetric</option><option>Some Gaps</option><option>Sparse</option></select></div>
        <div><label>Discolouration</label><select id="s-discolouration"><option>—</option><option>Low</option><option>Medium</option><option>High</option></select></div>
      </div>
      <div class="field-row"><div><label>Pest / disease</label><input type="text" id="s-pest" placeholder="e.g. Mealy Bug"></div></div>
    </div>
    <div id="lab-fields" style="display:none">
      <div class="field-row">
        <div><label>Total N (mg/l)</label><input type="number" id="s-n"></div>
        <div><label>Phosphorus (mg/l)</label><input type="number" id="s-p"></div>
        <div><label>Potassium (mg/l)</label><input type="number" id="s-k"></div>
      </div>
      <div class="field-row">
        <div><label>Calcium (mg/l)</label><input type="number" id="s-ca"></div>
        <div><label>Magnesium (mg/l)</label><input type="number" id="s-mg"></div>
        <div><label>Iron (mg/l)</label><input type="number" id="s-fe"></div>
      </div>
      <div class="field-row">
        <div><label>Sodium (mg/l)</label><input type="number" id="s-na"></div>
        <div><label>Lab reference</label><input type="text" id="s-labref"></div>
      </div>
    </div>
    <div style="margin-bottom:10px"><label>Notes</label><textarea id="s-notes" placeholder="Observations..."></textarea></div>
    <button class="primary" id="s-save-btn" onclick="addVisit()">Save reading</button>
  </div>
  ${chartBlocks}
  <div class="card">
    <div class="section-header"><p style="font-weight:500;font-size:14px">All records (${visits.length})</p>
      <div style="display:flex;gap:6px;font-size:11px">
        <span style="background:#E6F1FB;color:#0C447C;padding:1px 7px;border-radius:10px">Lab</span>
        <span style="background:#FAEEDA;color:#633806;padding:1px 7px;border-radius:10px">Visit</span>
      </div>
    </div>
    ${visits.length===0?'<p class="empty">No records yet</p>':'<div class="entry-list">'+entries+'</div>'}
  </div>`;
}

function toggleLabFields(){
  const isLab=fv('s-type')==='lab';
  document.getElementById('lab-fields').style.display=isLab?'block':'none';
  document.getElementById('visit-obs-fields').style.display=isLab?'none':'block';
}

async function addVisit(){
  const t=TREES[currentTree];
  const isLab=fv('s-type')==='lab';
  const btn=document.getElementById('s-save-btn');
  if(btn){btn.disabled=true;btn.textContent='Saving...';}
  try{
    const row={
      tree_ref:t.ref, date:fv('s-date'), record_type:fv('s-type'),
      ph:fv('s-ph')||null, ec:fv('s-ec')||null,
      soil_humidity:isLab?null:(fv('s-humidity')||null),
      leaf_drop:isLab?null:(fv('s-leafdrop')||null),
      water:isLab?null:(fv('s-water')||null),
      new_leaves:isLab?null:(fv('s-newleaves')||null),
      foliage:isLab?null:(fv('s-foliage')||null),
      discolouration:isLab?null:(fv('s-discolouration')||null),
      pest:isLab?null:(fv('s-pest')||null),
      nitrogen:fv('s-n')||null, phosphorus:fv('s-p')||null,
      potassium:fv('s-k')||null, calcium:fv('s-ca')||null,
      magnesium:fv('s-mg')||null, iron:fv('s-fe')||null,
      sodium:fv('s-na')||null, labref:fv('s-labref')||null,
      notes:fv('s-notes')||null
    };
    if(!row.date){alert('Date is required');return;}
    await sbInsert('visits',row);
    await loadTree(t.ref);
    renderSummary();renderTab();
  }catch(e){alert('Error saving: '+e.message);}
  finally{if(btn){btn.disabled=false;btn.textContent='Save reading';}}
}

async function deleteVisit(id){
  if(!confirm('Remove this record?'))return;
  const t=TREES[currentTree];
  try{await sbDelete('visits',id);await loadTree(t.ref);renderSummary();renderTab();}
  catch(e){alert('Error: '+e.message);}
}

function drawSoilCharts(){
  const t=TREES[currentTree];const d=treeData[t.ref];if(!d)return;
  const visits=d.visits;
  const phData=visits.filter(e=>e.ph);
  const ecData=visits.filter(e=>e.ec);
  const labData=visits.filter(e=>e.record_type==='lab'&&e.nitrogen);
  const mk=(id,labels,datasets)=>{const ctx=document.getElementById(id);if(!ctx)return;charts[id]=new Chart(ctx,{type:'line',data:{labels,datasets},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:datasets.length>1,labels:{font:{size:10}}}},scales:{x:{ticks:{font:{size:10},maxRotation:45}},y:{ticks:{font:{size:11}}}}}});};
  if(phData.length>=2)mk('chart-ph',phData.map(e=>fmtDate(e.date)),[{data:phData.map(e=>parseFloat(e.ph)),borderColor:'#639922',backgroundColor:'#63992222',tension:0.3,pointRadius:4,fill:true,borderWidth:2,label:'pH'}]);
  if(ecData.length>=2)mk('chart-ec',ecData.map(e=>fmtDate(e.date)),[{data:ecData.map(e=>parseFloat(e.ec)),borderColor:'#1D9E75',backgroundColor:'#1D9E7522',tension:0.3,pointRadius:4,fill:true,borderWidth:2,label:'EC'}]);
  if(labData.length>=1){const ld=labData.map(e=>fmtDate(e.date));mk('chart-npk',ld,[{data:labData.map(e=>parseFloat(e.nitrogen)),borderColor:'#185FA5',tension:0.3,pointRadius:4,borderWidth:2,label:'N'},{data:labData.map(e=>parseFloat(e.phosphorus)),borderColor:'#7F77DD',tension:0.3,pointRadius:4,borderWidth:2,label:'P'},{data:labData.map(e=>parseFloat(e.potassium)),borderColor:'#BA7517',tension:0.3,pointRadius:4,borderWidth:2,label:'K'}]);}
}

// ── LAB ANALYSIS ──────────────────────────────────────────────────────────────
function renderLabAnalysis(){
  const t=TREES[currentTree];const d=treeData[t.ref];if(!d)return'';
  const labs=d.visits.filter(e=>e.record_type==='lab');
  if(!labs.length)return`<p class="empty">No lab records yet. Add one in the Soil &amp; foliar tab.</p>`;
  const lab=labs[labs.length-1];
  const rag=calcRAG(d.visits);
  return`<div class="card">
    <div class="section-header"><p style="font-weight:500;font-size:14px">Overall RAG rating</p><span class="badge">Cawood NRM · ${fmtDate(lab.date)}</span></div>
    <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">${ragPill(rag,true)}<p style="font-size:13px;color:var(--color-text-secondary)">Based on Ficus nitida water extraction ideal ranges.</p></div>
    ${lab.notes?`<p style="font-size:12px;color:var(--color-text-secondary);margin-top:10px;border-top:0.5px solid var(--color-border-tertiary);padding-top:10px">${lab.notes}</p>`:''}
    ${lab.labref?`<p style="font-size:11px;color:var(--color-text-tertiary);margin-top:4px">Lab ref: ${lab.labref}</p>`:''}
  </div>
  <div class="card">
    <div class="section-header"><p style="font-weight:500;font-size:14px">Parameter breakdown</p>
      <div class="rag-legend" style="margin:0">
        <span class="rag-legend-item"><span class="rag-dot" style="background:#3B6D11"></span><span style="font-size:11px">Green</span></span>
        <span class="rag-legend-item"><span class="rag-dot" style="background:#EF9F27"></span><span style="font-size:11px">Amber</span></span>
        <span class="rag-legend-item"><span class="rag-dot" style="background:#E24B4A"></span><span style="font-size:11px">Red</span></span>
      </div>
    </div>
    <div style="overflow-x:auto"><table class="lab-table">
      <thead><tr><th>Parameter</th><th>Value</th><th>Rating</th><th>Ideal</th><th>Borderline</th><th>Action needed</th></tr></thead>
      <tbody>
        ${ragParamRow('ph',lab.ph)}${ragParamRow('ec',lab.ec)}
        ${ragParamRow('nitrogen',lab.nitrogen)}${ragParamRow('phosphorus',lab.phosphorus)}
        ${ragParamRow('potassium',lab.potassium)}${ragParamRow('calcium',lab.calcium)}
        ${ragParamRow('magnesium',lab.magnesium)}${ragParamRow('iron',lab.iron||'')}${ragParamRow('sodium',lab.sodium||'')}
      </tbody>
    </table></div>
  </div>`;
}

// ── VISIT OBSERVATIONS ────────────────────────────────────────────────────────
function renderObservations(){
  const t=TREES[currentTree];const d=treeData[t.ref];if(!d)return'';
  const data=d.visits.filter(e=>e.record_type!=='lab');
  if(!data.length)return`<p class="empty">No visit records yet.</p>`;
  const tableRows=data.map(e=>`<tr>
    <td>${fmtDate(e.date)}</td>
    <td>${e.soil_humidity!=null?e.soil_humidity+'%':'—'}</td>
    <td>${e.leaf_drop!=null?e.leaf_drop:'—'}</td>
    <td>${e.water!=null?e.water+'L':'—'}</td>
    <td>${e.new_leaves||'—'}</td><td>${e.foliage||'—'}</td><td>${e.discolouration||'—'}</td><td>${e.pest||'—'}</td>
  </tr>`).join('');
  const chartHtml=data.length>=2?`<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:10px;margin-bottom:1rem">
    <div class="card"><p style="font-size:13px;font-weight:500;margin-bottom:2px">Soil humidity (%)</p><div class="chart-wrap"><canvas id="chart-humidity"></canvas></div></div>
    <div class="card"><p style="font-size:13px;font-weight:500;margin-bottom:2px">Leaf drop</p><div class="chart-wrap"><canvas id="chart-leafdrop"></canvas></div></div>
    <div class="card"><p style="font-size:13px;font-weight:500;margin-bottom:2px">Water applied (L)</p><div class="chart-wrap"><canvas id="chart-water"></canvas></div></div>
  </div>`:'';
  return`${chartHtml}<div class="card">
    <div class="section-header"><p style="font-weight:500;font-size:14px">Visit observations (${data.length})</p></div>
    <div style="overflow-x:auto"><table class="obs-table">
      <thead><tr><th>Date</th><th>Soil humidity</th><th>Leaf drop</th><th>Water</th><th>New leaves</th><th>Foliage</th><th>Discolouration</th><th>Pest</th></tr></thead>
      <tbody>${tableRows}</tbody>
    </table></div>
  </div>`;
}

function drawObsCharts(){
  const t=TREES[currentTree];const d=treeData[t.ref];if(!d)return;
  const data=d.visits.filter(e=>e.record_type!=='lab');
  if(data.length<2)return;
  const labels=data.map(e=>fmtDate(e.date));
  const mk=(id,vals,col)=>{const ctx=document.getElementById(id);if(!ctx)return;charts[id]=new Chart(ctx,{type:'line',data:{labels,datasets:[{data:vals,borderColor:col,backgroundColor:col+'22',tension:0.3,pointRadius:4,fill:true,borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:10},maxRotation:45}},y:{beginAtZero:true,ticks:{font:{size:11}}}}}});};
  mk('chart-humidity',data.map(e=>e.soil_humidity!=null?parseFloat(e.soil_humidity):null),'#1D9E75');
  mk('chart-leafdrop',data.map(e=>e.leaf_drop!=null?parseFloat(e.leaf_drop):null),'#D85A30');
  mk('chart-water',data.map(e=>e.water!=null?parseFloat(e.water):null),'#185FA5');
}

// ── PHOTOS ────────────────────────────────────────────────────────────────────
function renderPhotos(){
  const t=TREES[currentTree];const d=treeData[t.ref];if(!d)return'';
  return`<div class="card">
    <div class="section-header"><p style="font-weight:500;font-size:14px">Log photograph</p><span class="badge">Visit record</span></div>
    <div class="field-row">
      <div><label>Date</label><input type="date" id="p-date" value="${today()}"></div>

function setPhotoSubTab(tab){

  const pc=document.getElementById('photo-content');if(pc)pc.innerHTML=renderPhotoContent();
}
function renderPhotoContent(){return currentPhotoSubTab==='progression'?renderPhotoProgression():renderPhotoAll();}

function renderPhotoProgression(){
  const t=TREES[currentTree];const d=treeData[t.ref];if(!d||!d.photos.length)return'<p class="empty">No photographs logged yet.</p>';
  const byPos={};POSITIONS.forEach(p=>byPos[p]=[]);
  d.photos.forEach(e=>{const pos=e.position||'Custom';if(!byPos[pos])byPos[pos]=[];byPos[pos].push(e);});
  const blocks=Object.entries(byPos).filter(([,arr])=>arr.length>0).map(([pos,arr])=>{
    const sorted=[...arr].sort((a,b)=>a.date.localeCompare(b.date));
    const cells=sorted.map(e=>`<div class="prog-cell">
      ${e.image_url?`<img src="${e.image_url}" alt="${pos}" loading="lazy">`:`<div class="no-img">No image</div>`}
      <div class="prog-date">${fmtDate(e.date)}</div><div style="font-size:11px;color:var(--color-text-tertiary)">${e.type||''}</div>
    </div>`).join('');
    return`<div class="progression-position"><h4>${pos} (${arr.length})</h4><div class="progression-row">${cells}</div></div>`;
  }).join('');
  return`<div class="card">${blocks}</div>`;
}

function renderPhotoAll(){

function excelDate(ds){if(!ds)return'';const p=ds.split('-');return p.length===3?`${p[2]}/${p[1]}/${p[0]}`:ds;}
function applyCell(ws,ref,value,type,bold,bg,fc){if(!ws[ref])ws[ref]={};ws[ref].v=value;ws[ref].t=type||'s';ws[ref].s={font:{name:'Arial',sz:bold?11:10,bold:!!bold,color:{rgb:fc||'333333'}},fill:{fgColor:{rgb:bg||'FFFFFF'},patternType:'solid'},alignment:{horizontal:'left',vertical:'center',wrapText:true},border:{top:{style:'thin',color:{rgb:'CCCCCC'}},bottom:{style:'thin',color:{rgb:'CCCCCC'}},left:{style:'thin',color:{rgb:'CCCCCC'}},right:{style:'thin',color:{rgb:'CCCCCC'}}}};}
function makeHdr(ws,row,headers){headers.forEach((h,i)=>{const ref=XLSX.utils.encode_cell({r:row,c:i});applyCell(ws,ref,h,'s',true,'243D10','FFFFFF');ws[ref].s.font.sz=9;});}
function makeTitleRow(ws,ref,text){applyCell(ws,ref,text,'s',true,'3B6D11','FFFFFF');ws[ref].s.font.sz=12;}
function dataRows(ws,startRow,rows){rows.forEach((row,ri)=>{const bg=ri%2===0?'F4FAF0':'FFFFFF';row.forEach((val,ci)=>{const ref=XLSX.utils.encode_cell({r:startRow+ri,c:ci});applyCell(ws,ref,val===undefined||val===null?'':val,typeof val==='number'?'n':'s',false,bg);});});}
function mergeRange(ws,r1,c1,r2,c2){if(!ws['!merges'])ws['!merges']=[];ws['!merges'].push({s:{r:r1,c:c1},e:{r:r2,c:c2}});}

function buildExcelWorkbook(ref){
  const d=treeData[ref];const t=TREES.find(x=>x.ref===ref);
  const wb=XLSX.utils.book_new();
  const visits=d.visits;const labs=visits.filter(e=>e.record_type==='lab');const lab=labs[labs.length-1];
  const sum={};makeTitleRow(sum,'A1',`${t.name} | ${t.ref} — Tree Service Logbook`);mergeRange(sum,0,0,0,3);
  makeHdr(sum,2,['Date','Lead','Commentary','Programme adjustments']);
  dataRows(sum,3,d.signoffs.length?d.signoffs.map(s=>[excelDate(s.date),s.lead,s.commentary,s.adjustments||'']):[[' ',' ',' ',' ']]);
  sum['!cols']=[{wch:14},{wch:24},{wch:44},{wch:44}];sum['!ref']='A1:D'+(4+d.signoffs.length);
  XLSX.utils.book_append_sheet(wb,sum,'Summary');
  const sf={};makeTitleRow(sf,'A1',`${t.name} (${t.ref}) — Soil & Foliar`);mergeRange(sf,0,0,0,12);
  makeHdr(sf,2,['Date','Type','pH','EC','N','P','K','Ca','Mg','Fe','Na','Lab ref','Notes']);
  dataRows(sf,3,visits.length?visits.map(e=>[excelDate(e.date),e.record_type==='lab'?'Lab':'Visit',e.ph?parseFloat(e.ph):'',e.ec?parseFloat(e.ec):'',e.nitrogen||'',e.phosphorus||'',e.potassium||'',e.calcium||'',e.magnesium||'',e.iron||'',e.sodium||'',e.labref||'',e.notes||'']):[[' ',' ',' ',' ',' ',' ',' ',' ',' ',' ',' ',' ',' ']]);
  sf['!cols']=[{wch:13},{wch:8},{wch:8},{wch:10},{wch:8},{wch:8},{wch:8},{wch:8},{wch:8},{wch:8},{wch:8},{wch:20},{wch:44}];sf['!ref']='A1:M'+(4+visits.length);
  XLSX.utils.book_append_sheet(wb,sf,'Soil & Foliar');
  const obsRows=visits.filter(e=>e.record_type!=='lab');
  const obs={};makeTitleRow(obs,'A1',`${t.name} (${t.ref}) — Visit Observations`);mergeRange(obs,0,0,0,7);
  makeHdr(obs,2,['Date','Soil humidity','Leaf drop','Water (L)','New leaves','Foliage','Discolouration','Pest']);
  dataRows(obs,3,obsRows.length?obsRows.map(e=>[excelDate(e.date),e.soil_humidity!=null?parseFloat(e.soil_humidity):'',e.leaf_drop!=null?parseFloat(e.leaf_drop):'',e.water!=null?parseFloat(e.water):'',e.new_leaves||'',e.foliage||'',e.discolouration||'',e.pest||'']):[[' ',' ',' ',' ',' ',' ',' ',' ']]);
  obs['!cols']=[{wch:13},{wch:14},{wch:12},{wch:10},{wch:12},{wch:14},{wch:14},{wch:18}];obs['!ref']='A1:H'+(4+obsRows.length);
  XLSX.utils.book_append_sheet(wb,obs,'Visit Observations');
  const tr={};makeTitleRow(tr,'A1',`${t.name} (${t.ref}) — Treatments`);mergeRange(tr,0,0,0,8);
  makeHdr(tr,2,['Date','Product','Type','Concentration','Volume','Method','Pest','Substrate','Notes']);
  dataRows(tr,3,d.treatments.length?d.treatments.map(e=>[excelDate(e.date),e.product,e.type||'',e.concentration||'',e.volume||'',e.method||'',e.pest||'',e.substrate||'',e.notes||'']):[[' ',' ',' ',' ',' ',' ',' ',' ',' ']]);
  tr['!cols']=[{wch:13},{wch:28},{wch:16},{wch:14},{wch:10},{wch:16},{wch:18},{wch:18},{wch:36}];tr['!ref']='A1:I'+(4+d.treatments.length);
  XLSX.utils.book_append_sheet(wb,tr,'Treatments');
  const ca={};makeTitleRow(ca,'A1',`${t.name} (${t.ref}) — Canopy`);mergeRange(ca,0,0,0,5);
  makeHdr(ca,2,['Date','Canopy spread (m)','Height (m)','New growth points','Density (%)','Notes']);
  dataRows(ca,3,d.canopy.length?d.canopy.map(e=>[excelDate(e.date),e.spread?parseFloat(e.spread):'',e.height?parseFloat(e.height):'',e.growth_pts?parseInt(e.growth_pts):'',e.density?Math.round(parseFloat(e.density)):'',e.notes||'']):[[' ',' ',' ',' ',' ',' ']]);
  ca['!cols']=[{wch:13},{wch:18},{wch:14},{wch:20},{wch:14},{wch:32}];ca['!ref']='A1:F'+(4+d.canopy.length);
  XLSX.utils.book_append_sheet(wb,ca,'Canopy');
  return wb;
}

function exportTreeExcel(i){const t=TREES[i];if(!treeData[t.ref]){alert('Please open this tree logbook first');return;}XLSX.writeFile(buildExcelWorkbook(t.ref),`${t.ref}_${t.name.replace(/\s+/g,'_')}_Logbook.xlsx`);}
async function exportAllExcel(){
  await loadAllTrees();
  TREES.forEach(t=>XLSX.writeFile(buildExcelWorkbook(t.ref),`${t.ref}_${t.name.replace(/\s+/g,'_')}_Logbook.xlsx`));
}

async function exportAllPDF(){
  const{jsPDF}=window.jspdf;const doc=new jsPDF({unit:'mm',format:'a4'});const m=18,pW=210;
  const ragLabels={R:'Action needed',A:'Borderline',G:'Good',null:'No data'};
  await loadAllTrees();
  TREES.forEach((t,i)=>{
    if(i>0)doc.addPage();
    const d=treeData[t.ref];const rag=calcRAG(d.visits);
    doc.setFillColor(59,109,17);doc.rect(0,0,210,28,'F');doc.setTextColor(255,255,255);doc.setFontSize(16);doc.setFont('helvetica','bold');doc.text(t.name,m,13);doc.setFontSize(10);doc.setFont('helvetica','normal');doc.text(`${t.ref} · ${new Date().toLocaleDateString('en-GB')} · RAG: ${ragLabels[rag]||'No data'}`,m,21);
    let y=36;const lab=d.visits.find(e=>e.record_type==='lab');const lc=d.canopy[d.canopy.length-1];
    doc.setFontSize(10);doc.setFont('helvetica','normal');doc.setTextColor(60,60,60);
    if(lab)doc.text(`Lab: pH ${lab.ph}  EC ${lab.ec}  N ${lab.nitrogen||'—'}  P ${lab.phosphorus||'—'}  K ${lab.potassium||'—'} mg/l`,m,y),y+=6;
    doc.text(`Spread: ${lc?parseFloat(lc.spread).toFixed(1)+'m':'—'}`,m,y);y+=8;
    doc.setDrawColor(59,109,17);doc.setLineWidth(0.3);doc.line(m,y,pW-m,y);y+=5;
    if(!d.signoffs.length){doc.setTextColor(150,150,150);doc.text('No sign-offs recorded.',m,y);}
    else d.signoffs.forEach(e=>{
      if(y>270){doc.addPage();y=20;}
      doc.setFontSize(10);doc.setFont('helvetica','bold');doc.setTextColor(40,80,20);doc.text(`${fmtDate(e.date)} — ${e.lead}`,m,y);y+=5;
      doc.setFont('helvetica','normal');doc.setTextColor(60,60,60);const ls=doc.splitTextToSize(e.commentary,pW-m*2);doc.text(ls,m,y);y+=ls.length*4.5+3;
    });
  });
  doc.save(`all_tree_signoffs_${new Date().toISOString().split('T')[0]}.pdf`);
}

async function exportTreePDF(i){
  const{jsPDF}=window.jspdf;const doc=new jsPDF({unit:'mm',format:'a4'});
  const t=TREES[i];const d=treeData[t.ref];
  const ragLabels={R:'Action needed',A:'Borderline',G:'Good',null:'No data'};
  const rag=calcRAG(d.visits);
  const pW=210,m=18,cW=pW-m*2;let y=m;
  const chk=(h=10)=>{if(y+h>285){doc.addPage();y=m;}};
  const ln=(txt,sz=11,bold=false,col=[40,40,40])=>{doc.setFontSize(sz);doc.setFont('helvetica',bold?'bold':'normal');doc.setTextColor(...col);const ls=doc.splitTextToSize(txt,cW);chk(ls.length*sz*0.4+2);doc.text(ls,m,y);y+=ls.length*(sz*0.42)+1;};
  const rule=()=>{chk(4);doc.setDrawColor(59,109,17);doc.setLineWidth(0.3);doc.line(m,y,pW-m,y);y+=4;};
  doc.setFillColor(59,109,17);doc.rect(0,0,210,28,'F');doc.setTextColor(255,255,255);doc.setFontSize(16);doc.setFont('helvetica','bold');doc.text(t.name,m,13);doc.setFontSize(10);doc.setFont('helvetica','normal');doc.text(`${t.ref} · ${new Date().toLocaleDateString('en-GB')} · RAG: ${ragLabels[rag]||'No data'}`,m,21);y=36;
  const lab=d.visits.find(e=>e.record_type==='lab');
  if(lab){ln('Lab analysis',13,true,[30,80,10]);rule();ln(`${fmtDate(lab.date)}  pH ${lab.ph}  EC ${lab.ec}  N ${lab.nitrogen||'—'}  P ${lab.phosphorus||'—'}  K ${lab.potassium||'—'} mg/l`,10);if(lab.notes)ln(lab.notes,9,false,[100,100,100]);y+=4;}
  const vs=d.visits.filter(e=>e.record_type!=='lab');
  ln('Visit observations',13,true,[30,80,10]);rule();
  if(!vs.length)ln('No records.',10,false,[120,120,120]);
  else vs.forEach(e=>{ln(`${fmtDate(e.date)}  EC ${e.ec||'—'}  pH ${e.ph||'—'}  Humidity ${e.soil_humidity!=null?e.soil_humidity+'%':'—'}  Leaf drop ${e.leaf_drop!=null?e.leaf_drop:'—'}  Pest: ${e.pest||'—'}`,10);if(e.notes)ln(e.notes,9,false,[100,100,100]);y+=1;});
  y+=4;ln('Treatments',13,true,[30,80,10]);rule();
  if(!d.treatments.length)ln('No records.',10,false,[120,120,120]);
  else d.treatments.forEach(e=>{ln(`${fmtDate(e.date)}  ${e.product}`,10,true);if(e.notes)ln(e.notes,9,false,[100,100,100]);y+=1;});
  y+=4;ln('Sign-offs',13,true,[30,80,10]);rule();
  if(!d.signoffs.length)ln('No sign-offs.',10,false,[120,120,120]);
  else d.signoffs.forEach(e=>{ln(`${fmtDate(e.date)} — ${e.lead}`,10,true);ln(e.commentary,10);if(e.adjustments)ln('Adjustments: '+e.adjustments,9,false,[80,100,60]);y+=2;});
  doc.save(`${t.ref}_${t.name.replace(/\s+/g,'_')}_Logbook.pdf`);
}
